// Parse a CSS declaration string into a React style object, so the design's
// inline styles can be reproduced verbatim.
function css(str){
  const o = {};
  if(!str) return o;
  String(str).split(';').forEach(decl => {
    const i = decl.indexOf(':');
    if(i < 0) return;
    let k = decl.slice(0, i).trim();
    const v = decl.slice(i + 1).trim();
    if(!k) return;
    k = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = v;
  });
  return o;
}

// Hoverable / focusable element wrapper — reproduces the design's
// style-hover / style-focus pseudo-states. Forwards a DOM ref via innerRef.
class Hx extends React.Component {
  constructor(p){ super(p); this.state = { h:false, f:false }; }
  render(){
    const { tag='div', css:c, hover, focus, innerRef, children,
            onMouseEnter, onMouseLeave, onFocus, onBlur, ...rest } = this.props;
    const style = {
      ...css(c),
      ...(this.state.h && hover ? css(hover) : null),
      ...(this.state.f && focus ? css(focus) : null),
    };
    return React.createElement(tag, {
      ...rest,
      ref: innerRef,
      style,
      onMouseEnter:(e)=>{ this.setState({h:true}); onMouseEnter && onMouseEnter(e); },
      onMouseLeave:(e)=>{ this.setState({h:false}); onMouseLeave && onMouseLeave(e); },
      onFocus:(e)=>{ this.setState({f:true}); onFocus && onFocus(e); },
      onBlur:(e)=>{ this.setState({f:false}); onBlur && onBlur(e); },
    }, children);
  }
}

  // ---- helpers ----

  statusOf(p) {
    if (p.bestand <= 0) return { key:'leer', label:'Nicht auf Lager', color:'#dc2626', bg:'#fef2f2' };
    if (p.bestand < p.mindestbestand) return { key:'kritisch', label:'Kritisch', color:'#dc2626', bg:'#fef2f2' };
    if (p.bestand < p.mindestbestand * 1.3) return { key:'bald', label:'Bald bestellen', color:'#b45309', bg:'#fffbeb' };
    return { key:'ok', label:'OK', color:'#15803d', bg:'#f0fdf4' };
  }
  userByName(n) { return this.state.users.find(u => u.name === n); }
  fmtTime(d) {
    const pad = x => String(x).padStart(2,'0');
    return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear()+' '+pad(d.getHours())+':'+pad(d.getMinutes());
  }
  relTime(d) {
    const diff = (Date.now() - d.getTime())/60000;
    if (diff < 1) return 'gerade eben';
    if (diff < 60) return Math.round(diff)+' Min.';
    if (diff < 1440) return Math.round(diff/60)+' Std.';
    return Math.round(diff/1440)+' Tg.';
  }

  doScan = () => {
    const code = (this.state.scanCode||'').trim().toLowerCase();
    if (!code) return;
    // Erst exakter Teilenummer-Treffer, dann Teil-Übereinstimmungen — sonst
    // würde eine Teileingabe das falsche Teil greifen.
    const p = this.state.parts.find(x => x.nummer.toLowerCase()===code)
           || this.state.parts.find(x => x.nummer.toLowerCase().includes(code))
           || this.state.parts.find(x => x.bezeichnung.toLowerCase().includes(code));
    if (p) { this.setState({ bookPart:p, bookQty:1, bookType:'entnahme', scanError:'', scanCode:'', bookDone:null }, ()=>{ if(this.qtyRef.current) this.qtyRef.current.focus(); }); }

  };
  onScanKey = (e) => { if (e.key==='Enter') this.doScan(); };

  setBookType = (t) => this.setState({ bookType:t });
  bumpQty = (d) => this.setState(s => ({ bookQty: Math.max(1, (s.bookQty||1)+d) }));

  confirmBooking = () => {
    const { bookPart, bookType, user } = this.state;
    if (!bookPart) return;
    // Über-Entnahme verhindern: bei Entnahme die Menge auf den vorhandenen
    // Bestand begrenzen, damit nie mehr gebucht wird als wirklich da ist.
    const reqQty = Math.max(1, this.state.bookQty||1);
    const isEntnahme = bookType==='entnahme';
    const qty = isEntnahme ? Math.min(reqQty, bookPart.bestand) : reqQty;
    if (isEntnahme && qty <= 0) { this.flash('Kein Bestand für eine Entnahme vorhanden'); return; }
    const newBestand = isEntnahme ? bookPart.bestand - qty : bookPart.bestand + qty;
    const parts = this.state.parts.map(p => p.id===bookPart.id ? {...p, bestand:newBestand} : p);
    const tx = { id:'t'+Date.now(), ts:new Date(), user:user.name, type: isEntnahme?'Entnahme':'Einlagerung', nummer:bookPart.nummer, bezeichnung:bookPart.bezeichnung, menge:qty, rest:newBestand };
    this.setState({ parts, transactions:[tx, ...this.state.transactions],
      bookDone:{ type:tx.type, menge:qty, einheit:bookPart.einheit, bezeichnung:bookPart.bezeichnung, rest:newBestand, nummer:bookPart.nummer }, bookPart:null });
    this.flash(tx.type+' gebucht: '+qty+'× '+bookPart.bezeichnung);
  };
  newBooking = () => this.setState({ bookDone:null, bookPart:null, scanError:'' }, ()=>{ if(this.scanRef.current) this.scanRef.current.focus(); });
  cancelBook = () => this.setState({ bookPart:null, scanError:'' }, ()=>{ if(this.scanRef.current) this.scanRef.current.focus(); });

  // --- Nachbestellen ---
  recommendQty(p) { const target = Math.max(p.mindestbestand*2, p.mindestbestand+1); return Math.max(0, target - p.bestand); }
  verbrauch(nummer) { return this.state.transactions.filter(t=>t.nummer===nummer && t.type==='Entnahme').reduce((a,t)=>a+t.menge,0); }
  ensureReorderInit = () => {
    if (this.state.reorderInit) return;
    const need = this.state.parts.filter(p => p.bestand < p.mindestbestand*1.3);
    const sel={}, qty={};
    need.forEach(p => { sel[p.id]=true; qty[p.id]=this.recommendQty(p); });
    this.setState({ reorderSel:sel, reorderQty:qty, reorderInit:true });
  };
  toggleReorder = (id) => this.setState(s => ({ reorderSel:{...s.reorderSel, [id]: !(s.reorderSel[id]!==false)} }));
  setReorderQty = (id) => (e) => { const v=parseInt(e.target.value,10); this.setState(s=>({ reorderQty:{...s.reorderQty,[id]:isNaN(v)?0:Math.max(0,v)} })); };
  toggleRecipient = (id) => this.setState(s => ({ recipients:s.recipients.map(r=>r.id===id?{...r,sel:!r.sel}:r) }));
  setOrderTab = (t) => this.setState({ orderTab:t });

  selectedOrderParts() {
    return this.state.parts
      .filter(p => p.bestand < p.mindestbestand*1.3)
      .filter(p => this.state.reorderSel[p.id]!==false)
      .map(p => ({ ...p, menge: this.state.reorderQty[p.id]!==undefined ? this.state.reorderQty[p.id] : this.recommendQty(p), verbrauch:this.verbrauch(p.nummer) }))
      .filter(p => p.menge>0);
  }

  // Regelbasierter Bestellvorschlag (keine KI). Optimiert die Mengen aus
  // Bestand + Mindestbestand und rundet Normteile auf praktische Gebinde.
  runSuggestion = () => {
    const items = this.selectedOrderParts();
    if (!items.length) { this.flash('Bitte zuerst Teile auswählen'); return; }
    const qty = {...this.state.reorderQty}; const reasons=[];
    items.forEach(p => { let m = this.recommendQty(p);
      const isNorm = /DIN|M\d|912|6885|6796|471|RSM/.test(p.nummer);
      if (isNorm) m = Math.ceil(m/50)*50 || 50;
      qty[p.id]=m;
      const grund = p.bestand===0 ? 'leer — dringend auffüllen' : (p.verbrauch>p.mindestbestand ? 'hoher Verbrauch gesamt' : 'auf Sollbestand auffüllen');
      reasons.push({ bezeichnung:p.bezeichnung, nummer:p.nummer, menge:m, grund });
    });
    this.setState({ reorderQty:qty, aiReasons:reasons, aiDone:true });
    this.flash('Bestellvorschlag berechnet');
  };

  buildEmailBody() {
    const items = this.selectedOrderParts();
    const head = 'Bitte folgende Teile nachbestellen:\n\n';
    const rows = items.map(p => `• ${p.menge} ${p.einheit}  ${p.bezeichnung}  (${p.nummer})  — aktueller Bestand ${p.bestand}, Mindestbestand ${p.mindestbestand}`).join('\n');
    const note = this.state.emailNote.trim() ? `\n\nNotiz: ${this.state.emailNote.trim()}` : '';
    return head + rows + note + `\n\nGesendet von ${this.state.user?this.state.user.name:''} · LagerPilot`;
  }
  // Echter Versand über das Mailprogramm des Nutzers (mailto:). Eine statische
  // Seite kann selbst keine Mail verschicken — so wird „Senden" aber real.
  sendEmail = () => {
    const items = this.selectedOrderParts();
    if (!items.length) { this.flash('Bitte zuerst Teile auswählen'); return; }
    const recs = this.state.recipients.filter(r=>r.sel).map(r=>r.email);
    if (this.state.customEmail.trim()) recs.push(this.state.customEmail.trim());
    if (!recs.length) { this.flash('Bitte mindestens einen Empfänger wählen'); return; }
    const subject = 'Nachbestellung Lager — '+items.length+' Positionen';
    const href = 'mailto:'+encodeURIComponent(recs.join(','))+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(this.buildEmailBody());
    try { window.location.href = href; } catch(e) {}
    const order = { id:'o'+Date.now(), ts:new Date(), method:'E-Mail', to:recs, count:items.length,
      totalMenge:items.reduce((a,p)=>a+p.menge,0), parts:items.map(p=>({nummer:p.nummer,bezeichnung:p.bezeichnung,menge:p.menge,einheit:p.einheit})),
      user:this.state.user?this.state.user.name:'' };
    this.setState({ sentOrders:[order, ...this.state.sentOrders], orderTab:'gesendet' });
    this.flash('E-Mail-Programm geöffnet — bitte dort senden');
  };

  // --- Lagerplätze ---
  qrSvg(text, size) {
    try {
      const qr = qrcode(0, 'M'); qr.addData(text); qr.make();
      const c = qr.getModuleCount(); const cell = size / c; let rects = '';
      for (let r=0;r<c;r++) for (let col=0;col<c;col++) if (qr.isDark(r,col)) rects += `<rect x="${(col*cell).toFixed(2)}" y="${(r*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#0f172a">${rects}</g></svg>`;
      return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
    } catch(e) { return 'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="#f3f4f6"/></svg>`); }
  }
  doBinScan = () => {
    const code = (this.state.binQuery||'').trim().toUpperCase();
    if (!code) return;
    const norm = code.replace(/^LAGERPLATZ:/,'').trim();
    const exists = this.state.parts.some(p => p.lagerplatz.toUpperCase()===norm);
    if (exists) this.setState({ binCode:norm, binError:'', binQuery:'' });
    else this.setState({ binError:'Kein Lagerplatz „'+this.state.binQuery+'" gefunden', binQuery:'' }, ()=>{ if(this.binScanRef.current) this.binScanRef.current.focus(); });
  };
  onBinKey = (e) => { if (e.key==='Enter') this.doBinScan(); };
  clearBin = () => this.setState({ binCode:null, binError:'' }, ()=>{ if(this.binScanRef.current) this.binScanRef.current.focus(); });
  setBinMode = (m) => this.setState({ binMode:m, binError:'' });
  printBin = () => { setTimeout(()=>window.print(), 60); };

  // --- Baubarkeit ---
  doDrawingScan = () => {
    const code = (this.state.drawingQuery||'').trim().toLowerCase();
    if (!code) return;
    const d = this.drawings.find(x => x.nummer.toLowerCase()===code)
           || this.drawings.find(x => x.nummer.toLowerCase().includes(code))
           || this.drawings.find(x => x.bezeichnung.toLowerCase().includes(code));
    if (d) this.setState({ drawingId:d.id, drawingError:'', drawingQuery:'' });
    else this.setState({ drawingError:'Keine Zeichnung zu „'+this.state.drawingQuery+'" gefunden', drawingQuery:'' }, ()=>{ if(this.drawingScanRef.current) this.drawingScanRef.current.focus(); });
  };
  onDrawingKey = (e) => { if (e.key==='Enter') this.doDrawingScan(); };
  clearDrawing = () => this.setState({ drawingId:null, drawingError:'' }, ()=>{ if(this.drawingScanRef.current) this.drawingScanRef.current.focus(); });

  // edit / create
  existingCats() { return Array.from(new Set(this.state.parts.map(x => x.kategorie).filter(Boolean))); }
  startEdit = () => { const p = this.state.parts.find(x=>x.id===this.state.selectedPartId); this.setState({ editing:true, editDraft:{...p}, editCatNew: !this.existingCats().includes(p.kategorie) }); };
  startCreate = () => this.setState({ view:'detail', creating:true, editing:true, selectedPartId:null, editCatNew:false, editDraft:{ id:'new', nummer:'', bezeichnung:'', lagerplatz:'', bestand:0, mindestbestand:0, einheit:'Stk', kategorie: this.existingCats()[0] || 'Verbindungselemente' } });
  editField = (k) => (e) => { let v = e.target.value; if(k==='bestand'||k==='mindestbestand') v = v===''?0:Math.max(0,parseInt(v,10)||0); this.setState({ editDraft:{...this.state.editDraft, [k]:v} }); };
  editCatSelect = (e) => { const v = e.target.value;
    if (v==='__new__') this.setState({ editCatNew:true, editDraft:{...this.state.editDraft, kategorie:''} });
    else this.setState({ editCatNew:false, editDraft:{...this.state.editDraft, kategorie:v} });
  };
  cancelEdit = () => { if(this.state.creating) this.setState({ view:'teile', editing:false, creating:false, editDraft:null }); else this.setState({ editing:false, editDraft:null }); };
  saveEdit = () => {
    const d = this.state.editDraft;
    if (!d.nummer.trim() || !d.bezeichnung.trim()) { this.flash('Teilenummer und Bezeichnung sind Pflicht'); return; }
    // Teilenummer muss eindeutig sein — doppelte Nummern brechen sonst
    // Buchung und Stücklisten-Auflösung (beide nehmen den ersten Treffer).
    const num = d.nummer.trim().toLowerCase();
    const dupe = this.state.parts.some(p => p.id!==d.id && p.nummer.trim().toLowerCase()===num);
    if (dupe) { this.flash('Teilenummer „'+d.nummer.trim()+'" existiert bereits'); return; }
    const clean = { ...d, nummer:d.nummer.trim(), bezeichnung:d.bezeichnung.trim(), kategorie:(d.kategorie||'').trim()||'Sonstige' };
    if (this.state.creating) {
      const id = 'p'+Date.now();
      this.setState({ parts:[{...clean, id}, ...this.state.parts], view:'detail', selectedPartId:id, editing:false, creating:false, editDraft:null });
      this.flash('Teil angelegt: '+clean.bezeichnung);
    } else {
      this.setState({ parts:this.state.parts.map(p=>p.id===d.id?{...clean}:p), editing:false, editDraft:null });
      this.flash('Änderungen gespeichert');
    }
  };
  deletePart = (id) => {
    const p = this.state.parts.find(x=>x.id===id); if (!p) return;
    if (typeof window!=='undefined' && window.confirm && !window.confirm('Teil „'+p.bezeichnung+'" wirklich löschen? Bestand und Verknüpfungen gehen verloren.')) return;
    this.setState({ parts:this.state.parts.filter(x=>x.id!==id), view:'teile', selectedPartId:null, editing:false, creating:false, editDraft:null });
    this.flash('Teil gelöscht: '+p.bezeichnung);
  };

  // --- Login / Registrierung ---
  pickLoginUser = (id) => this.setState({ loginUser:id, authError:'' });
  doLogin = () => {
    const u = this.state.users.find(x => x.id === this.state.loginUser);
    if (!u) { this.setState({ authError:'Bitte zuerst einen Mitarbeiter wählen' }); return; }
    if ((this.state.pin||'') !== (u.password||'')) { this.setState({ authError:'Falsches Passwort für '+u.name }); return; }
    this.setState({ screen:'app', user:u, view:'dashboard', pin:'', authError:'' });
  };
  setLoginMode = (m) => this.setState({ loginMode:m, authError:'', regError:'', reg:{ name:'', role:'Montage', pass:'', pass2:'' } });
  regField = (k) => (e) => this.setState({ reg:{ ...this.state.reg, [k]:e.target.value } });
  submitRegister = () => {
    const r = this.state.reg;
    if (!r.name.trim()) { this.setState({ regError:'Bitte Namen eingeben' }); return; }
    if ((r.pass||'').length < 4) { this.setState({ regError:'Passwort muss mindestens 4 Zeichen haben' }); return; }
    if (r.pass !== r.pass2) { this.setState({ regError:'Passwörter stimmen nicht überein' }); return; }
    if (this.state.users.some(u => u.name.trim().toLowerCase() === r.name.trim().toLowerCase())) { this.setState({ regError:'Dieser Name existiert bereits' }); return; }
    const u = { id:'u'+Date.now(), name:r.name.trim(), role:r.role||'Sonstige', initials:this.initialsOf(r.name), hue:Math.floor(Math.random()*360), password:r.pass, admin:false };
    const users = [...this.state.users, u]; this.saveUsers(users);
    this.setState({ users, loginMode:'login', loginUser:u.id, pin:'', regError:'', authError:'' });
    this.flash('Konto erstellt — jetzt mit deinem Passwort anmelden');
  };

  // --- Passwort ändern (eigenes Konto) ---
  openPwModal = () => this.setState({ pwModal:true, pwCur:'', pwNew:'', pwNew2:'', pwError:'' });
  closePwModal = () => this.setState({ pwModal:false, pwError:'' });
  submitPwChange = () => {
    const { pwCur, pwNew, pwNew2, user } = this.state;
    if (!user) return;
    if (pwCur !== user.password) { this.setState({ pwError:'Aktuelles Passwort ist falsch' }); return; }
    if ((pwNew||'').length < 4) { this.setState({ pwError:'Neues Passwort muss mindestens 4 Zeichen haben' }); return; }
    if (pwNew !== pwNew2) { this.setState({ pwError:'Neue Passwörter stimmen nicht überein' }); return; }
    const users = this.state.users.map(u => u.id===user.id ? { ...u, password:pwNew } : u);
    this.saveUsers(users);
    this.setState({ users, user:{ ...user, password:pwNew }, pwModal:false, pwError:'' });
    this.flash('Passwort geändert');
  };

  // --- Benutzerverwaltung (Personal) ---
  startUserCreate = () => this.setState({ userEditing:true, userError:'', userDraft:{ id:null, name:'', role:'Montage', password:'', admin:false } });
  startUserEdit = (id) => { const u = this.state.users.find(x=>x.id===id); if(u) this.setState({ userEditing:true, userError:'', userDraft:{ id:u.id, name:u.name, role:u.role, password:'', admin:!!u.admin } }); };
  cancelUser = () => this.setState({ userEditing:false, userDraft:null, userError:'' });
  userField = (k) => (e) => { const v = k==='admin' ? e.target.checked : e.target.value; this.setState({ userDraft:{ ...this.state.userDraft, [k]:v } }); };
  saveUser = () => {
    const d = this.state.userDraft; if (!d) return;
    if (!d.name.trim()) { this.setState({ userError:'Bitte Namen eingeben' }); return; }
    const dupe = this.state.users.some(u => u.id!==d.id && u.name.trim().toLowerCase()===d.name.trim().toLowerCase());
    if (dupe) { this.setState({ userError:'Dieser Name existiert bereits' }); return; }
    if (!d.id && (d.password||'').length < 4) { this.setState({ userError:'Passwort muss mindestens 4 Zeichen haben' }); return; }
    let users, updatedSelf = null;
    if (d.id) {
      users = this.state.users.map(u => {
        if (u.id !== d.id) return u;
        const merged = { ...u, name:d.name.trim(), role:d.role, admin:!!d.admin, initials:this.initialsOf(d.name) };
        if ((d.password||'').length >= 4) merged.password = d.password;
        if (this.state.user && this.state.user.id===u.id) updatedSelf = merged;
        return merged;
      });
    } else {
      const u = { id:'u'+Date.now(), name:d.name.trim(), role:d.role||'Sonstige', initials:this.initialsOf(d.name), hue:Math.floor(Math.random()*360), password:d.password, admin:!!d.admin };
      users = [...this.state.users, u];
    }
    // Es muss immer mindestens ein Admin übrig bleiben (auch nach „Bearbeiten").
    if (!users.some(u => u.admin)) { this.setState({ userError:'Mindestens ein Administrator muss bestehen bleiben' }); return; }
    this.saveUsers(users);
    // Hat sich der angemeldete Admin selbst die Rechte genommen, darf er die
    // Personal-Seite nicht mehr sehen → zurück aufs Dashboard.
    const lostOwnAdmin = updatedSelf && !updatedSelf.admin && this.state.view==='personal';
    this.setState({ users, userEditing:false, userDraft:null, userError:'',
      ...(updatedSelf?{user:updatedSelf}:{}), ...(lostOwnAdmin?{view:'dashboard'}:{}) });
    this.flash(d.id ? 'Mitarbeiter aktualisiert: '+d.name.trim() : 'Mitarbeiter angelegt: '+d.name.trim());
  };
  deleteUser = (id) => {
    if (this.state.user && this.state.user.id === id) { this.flash('Das eigene Konto kann nicht gelöscht werden'); return; }
    const remaining = this.state.users.filter(u => u.id !== id);
    if (!remaining.some(u => u.admin)) { this.flash('Mindestens ein Admin muss bestehen bleiben'); return; }
    this.saveUsers(remaining);
    this.setState({ users:remaining });
    this.flash('Mitarbeiter gelöscht');
  };

  componentDidUpdate(_, prev) {
    if (this.state.view==='buchen' && prev.view!=='buchen' && !this.state.bookPart && !this.state.bookDone) {
      setTimeout(()=>{ if(this.scanRef.current) this.scanRef.current.focus(); }, 50);
    }
    if (this.state.view==='baubarkeit' && prev.view!=='baubarkeit' && !this.state.drawingId) {
      setTimeout(()=>{ if(this.drawingScanRef.current) this.drawingScanRef.current.focus(); }, 50);
    }
    if (this.state.view==='bestellung' && prev.view!=='bestellung') this.ensureReorderInit();
    // Persistenz: Bestände, Buchungen und ausgelöste Bestellungen spiegeln.
    if (prev.parts !== this.state.parts) this.saveJSON('lp_parts', this.state.parts);
    if (prev.transactions !== this.state.transactions) this.saveJSON('lp_tx', this.state.transactions);
    if (prev.sentOrders !== this.state.sentOrders) this.saveJSON('lp_orders', this.state.sentOrders);
  }

  computeVals() {
    const s = this.state, accent = this.accent;
    const withStatus = p => { const st = this.statusOf(p); return { ...p, statusLabel:st.label, statusColor:st.color, statusBg:st.bg, statusKey:st.key, open:()=>this.openPart(p.id) }; };
    const partsS = s.parts.map(withStatus);
    const critical = partsS.filter(p => p.statusKey==='kritisch' || p.statusKey==='leer');
    const reorder = partsS.filter(p => p.statusKey==='bald');
    const todayTx = s.transactions.filter(t => this.isToday(t.ts));
    const totalUnits = s.parts.reduce((a,p)=>a+p.bestand,0);

    // nav
    const mk = (key,label,badge) => ({ key,label, onClick:()=>this.go(key),
      bg: s.view===key ? accent : 'transparent', fg: s.view===key ? '#fff':'#cbd5e1',
      dot: s.view===key ? '#fff' : '#475569', weight: s.view===key ? '600':'500', badge: badge||null });
    const navItems = [
      mk('dashboard','Dashboard'),
      mk('buchen','Buchen'),
      mk('teile','Teile & Suche'),
      mk('baubarkeit','Baubarkeit'),
      mk('lagerplaetze','Lagerplätze'),
      mk('warnungen','Warnungen', (critical.length)||null),
      mk('bestellung','Nachbestellen'),
      mk('historie','Historie'),
    ];
    if (s.user && s.user.admin) navItems.push(mk('personal','Personal'));

    const titles = { dashboard:'Dashboard', buchen:'Buchen — Entnahme & Einlagerung', teile:'Teile & Suche', baubarkeit:'Baubarkeit — Zeichnung prüfen', lagerplaetze:'Lagerplätze — QR-Codes & Inhalt', bestellung:'Nachbestellen — Vorschlag & E-Mail', detail: s.creating?'Neues Teil anlegen':'Teil-Details', warnungen:'Warnungen', historie:'Transaktions-Historie', personal:'Personal — Benutzerverwaltung' };

    const txView = t => { const u=this.userByName(t.user); const ein = t.type==='Einlagerung';
      return { ...t, when:this.relTime(t.ts), whenFull:this.fmtTime(t.ts), sign: ein?'+':'–', tColor: ein?'#15803d':'#b45309', tBg: ein?'#f0fdf4':'#fffbeb',
        deltaLabel:(ein?'+':'−')+t.menge, uInit:u?u.initials:'?', uHue:u?u.hue:220 }; };

    // detail
    const selPart = s.selectedPartId ? partsS.find(p=>p.id===s.selectedPartId) : null;
    const selTx = selPart ? s.transactions.filter(t=>t.nummer===selPart.nummer).map(txView) : [];

    // teile filtering
    const q = s.search.trim().toLowerCase();
    let listed = partsS.filter(p => !q || p.nummer.toLowerCase().includes(q) || p.bezeichnung.toLowerCase().includes(q) || p.lagerplatz.toLowerCase().includes(q));
    if (s.filterCat!=='Alle') listed = listed.filter(p=>p.kategorie===s.filterCat);
    listed = [...listed].sort((a,b)=> s.sortKey==='bestand' ? a.bestand-b.bestand : a[s.sortKey].localeCompare(b[s.sortKey]));
    const cats = ['Alle', ...Array.from(new Set(s.parts.map(p=>p.kategorie)))];

    // buildability
    let drawingResult = null;
    if (s.drawingId) {
      const d = this.drawings.find(x => x.id===s.drawingId);
      if (d) {
        let lines = d.bom.map(b => { const part = s.parts.find(p=>p.nummer===b.nummer); const avail = part?part.bestand:0; const possible = Math.floor(avail / b.menge);
          return { nummer:b.nummer, bezeichnung:part?part.bezeichnung:b.nummer, lagerplatz:part?part.lagerplatz:'—', mengePer:b.menge, avail, possible, einheit:part?part.einheit:'Stk', partId:part?part.id:null }; });
        const buildable = lines.length ? Math.min(...lines.map(l=>l.possible)) : 0;
        const maxP = Math.max(1, ...lines.map(l=>l.possible));
        lines = lines.map(l => ({ ...l, limiting:l.possible===buildable, open: l.partId?()=>this.openPart(l.partId):()=>{},
          barPct: Math.round(l.possible/maxP*100), rowBg: l.possible===buildable?'#fef2f2':'#fff', barColor: l.possible===buildable?'#dc2626':'#cbd5e1', possColor: l.possible===buildable?'#dc2626':'#374151' }));
        const limitNames = lines.filter(l=>l.limiting).map(l=>l.bezeichnung);
        drawingResult = { id:d.id, nummer:d.nummer, bezeichnung:d.bezeichnung, lines, buildable, partCount:d.bom.length, canBuild:buildable>0,
          buildableColor: buildable===0?'#dc2626':(buildable<5?'#b45309':'#15803d'), buildableBg: buildable===0?'#fef2f2':(buildable<5?'#fffbeb':'#f0fdf4'),
          bannerBg: buildable===0?'#fef2f2':(buildable<5?'#fffbeb':'#f0fdf4'), bannerBorder: buildable===0?'#fecaca':(buildable<5?'#fde68a':'#bbf7d0'),
          limitNames: limitNames.join(', '), limitCount: limitNames.length };
      }
    }

    const cu = s.user || {};

                  {V.editing && (

                        <div style={css(`width:58px;height:58px;border-radius:14px;background:#eff6ff;color:${accent};display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px`)}>▤</div>

                    <div style={css(`background:${V.drawingResult.bannerBg};border:1px solid ${V.drawingResult.bannerBorder};border-radius:16px;padding:26px 30px;display:flex;align-items:center;gap:24px;margin-bottom:18px`)}>

                        <div style={css("padding:18px 22px")}>

                          {V.emailNote && <div style={css("margin-top:14px;padding:11px 14px;background:#f9fafb;border-radius:9px;font-size:13px;color:#6b7280")}>Notiz: {V.emailNote}</div>}

                        <div style={css("display:flex;align-items:center;gap:12px;padding:16px 22px;border-top:1px solid #f0f1f3;background:#fafafa")}>

                        </div>
                      </div>
                    </div>

                      {V.noSent && (
                        <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:48px;text-align:center")}>
                          <div style={css(`width:56px;height:56px;border-radius:14px;background:#eff6ff;color:${accent};display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px`)}>✉</div>

                        <div style={css("display:flex;flex-direction:column;gap:12px")}>

                            <div key={o.id} style={css("background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:18px 22px")}>

                                <div style={css("flex:1")}><div style={css("font-size:14.5px;font-weight:700;color:#111827")}>{o.method}-Bestellanforderung · {o.count} Positionen</div><div style={css("font-size:12px;color:#9ca3af")}>{o.when} · von {o.user}</div></div>

                          ))}
                        </div>
                      )}
                    </React.Fragment>
                  )}

                </div>
                )}

                {V.isWarnungen && (
                <div style={css("max-width:980px;animation:lpfade .3s ease")}>
                  {V.allGood && (
                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:48px;text-align:center")}>
                      <div style={css("width:60px;height:60px;border-radius:50%;background:#f0fdf4;color:#15803d;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 16px")}>✓</div>
                      <div style={css("font-size:18px;font-weight:700;color:#111827")}>Keine Warnungen</div>
                      <div style={css("font-size:14px;color:#6b7280;margin-top:5px")}>Alle Teile liegen über dem Mindestbestand.</div>
                    </div>
                  )}

                  {V.warnCriticalCount > 0 && (<React.Fragment>
                    <div style={css("display:flex;align-items:center;gap:10px;margin-bottom:12px")}>
                      <span style={css("width:10px;height:10px;border-radius:50%;background:#dc2626")}></span>
                      <span style={css("font-size:16px;font-weight:700;color:#111827")}>Kritisch — sofort bestellen</span>
                      <span style={css("font-size:13px;color:#9ca3af")}>({V.warnCriticalCount})</span>
                    </div>
                    <div className="lp-grid-2" style={css("display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:26px")}>
                      {V.warnCritical.map(p => (
                        <Hx key={p.id} tag="button" onClick={p.open} css="text-align:left;display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid #fecaca;border-radius:13px;background:#fff;border-left:4px solid #dc2626" hover="background:#fffafa">
                          <div style={css("flex:1;min-width:0")}><div style={css("font-size:15px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{p.bezeichnung}</div><div style={css("font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9ca3af;margin-top:2px")}>{p.nummer} · {p.lagerplatz}</div></div>
                          <div style={css("text-align:right;flex:none")}><div style={css("font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:#dc2626")}>{p.bestand}</div><div style={css("font-size:11px;color:#9ca3af")}>Min. {p.mindestbestand}</div></div>
                        </Hx>
                      ))}
                    </div>
                  </React.Fragment>)}

                  {V.warnReorderCount > 0 && (<React.Fragment>
                    <div style={css("display:flex;align-items:center;gap:10px;margin-bottom:12px")}>
                      <span style={css("width:10px;height:10px;border-radius:50%;background:#d97706")}></span>
                      <span style={css("font-size:16px;font-weight:700;color:#111827")}>Bald bestellen</span>
                      <span style={css("font-size:13px;color:#9ca3af")}>({V.warnReorderCount})</span>
                    </div>
                    <div className="lp-grid-2" style={css("display:grid;grid-template-columns:1fr 1fr;gap:12px")}>
                      {V.warnReorder.map(p => (
                        <Hx key={p.id} tag="button" onClick={p.open} css="text-align:left;display:flex;align-items:center;gap:14px;padding:16px 18px;border:1px solid #fde68a;border-radius:13px;background:#fff;border-left:4px solid #d97706" hover="background:#fffdf7">
                          <div style={css("flex:1;min-width:0")}><div style={css("font-size:15px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{p.bezeichnung}</div><div style={css("font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9ca3af;margin-top:2px")}>{p.nummer} · {p.lagerplatz}</div></div>
                          <div style={css("text-align:right;flex:none")}><div style={css("font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:#b45309")}>{p.bestand}</div><div style={css("font-size:11px;color:#9ca3af")}>Min. {p.mindestbestand}</div></div>
                        </Hx>
                      ))}
                    </div>
                  </React.Fragment>)}
                </div>
                )}

                {/* HISTORIE */}
                {V.isHistorie && (
                <div style={css("max-width:980px;animation:lpfade .3s ease")}>
                  <div style={css("display:flex;align-items:center;gap:16px;margin-bottom:16px")}>
                    <div style={css("font-size:13.5px;color:#6b7280")}>{V.allTxCount} Buchungen gesamt · {V.todayCount} heute</div>
                  </div>
                  <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden")}>
                    <div style={css("display:grid;grid-template-columns:0.5fr 2fr 1fr 1fr 0.8fr;gap:12px;padding:12px 22px;background:#f9fafb;border-bottom:1px solid #f0f1f3;font-size:11.5px;font-weight:600;letter-spacing:.04em;color:#9ca3af;text-transform:uppercase")}>
                      <div></div><div>Teil</div><div>Mitarbeiter</div><div>Zeitpunkt</div><div style={css("text-align:right")}>Menge</div>
                    </div>
                    {V.allTx.map(t => (
                      <div key={t.id} style={css("display:grid;grid-template-columns:0.5fr 2fr 1fr 1fr 0.8fr;gap:12px;align-items:center;padding:12px 22px;border-bottom:1px solid #f4f5f7")}>
                        <div><div style={css(`width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;background:${t.tBg};color:${t.tColor}`)}>{t.sign}</div></div>
                        <div style={css("min-width:0")}><div style={css("font-size:14px;font-weight:500;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{t.bezeichnung}</div><div style={css("font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#9ca3af")}>{t.nummer}</div></div>
                        <div style={css("display:flex;align-items:center;gap:8px;min-width:0")}><div style={css("width:24px;height:24px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;background:#eef2f7;color:#475569")}>{t.uInit}</div><span style={css("font-size:13px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{t.user}</span></div>
                        <div style={css("font-size:13px;color:#6b7280")}>{t.whenFull}</div>
                        <div style={css(`text-align:right;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:${t.tColor}`)}>{t.deltaLabel}</div>
                      </div>
                    ))}
                  </div>
                </div>
                )}

                {/* PERSONAL / BENUTZERVERWALTUNG */}
                {V.isPersonal && (
                <div style={css("max-width:920px;animation:lpfade .3s ease")}>

                  {V.userEditing && (
                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04);margin-bottom:18px")}>
                      <div style={css("padding:20px 26px;border-bottom:1px solid #f0f1f3;font-size:17px;font-weight:700;color:#111827")}>{V.userEditTitle}</div>
                      <div style={css("padding:26px;display:grid;grid-template-columns:1fr 1fr;gap:18px")}>
                        <div style={css("grid-column:1 / -1")}>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Name *</div>
                          <Hx tag="input" value={V.userDraft.name||''} onChange={V.ufName} placeholder="z. B. Max Mustermann" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Rolle / Abteilung</div>
                          <Hx tag="select" value={V.userDraft.role||'Montage'} onChange={V.ufRole} css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;background:#fff;outline:none" focus={`border-color:${accent}`}>
                            {V.roleOptions.map(r => <option key={r} value={r}>{r}</option>)}
                          </Hx>
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>{V.userIsEdit ? 'Neues Passwort (optional)' : 'Passwort *'}</div>
                          <Hx tag="input" value={V.userDraft.password||''} onChange={V.ufPass} type="password" placeholder={V.userIsEdit ? 'leer lassen = unverändert' : 'mind. 4 Zeichen'} css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <label style={css("grid-column:1 / -1;display:flex;align-items:center;gap:10px;font-size:14px;color:#374151;cursor:pointer")}>
                          <input type="checkbox" checked={!!V.userDraft.admin} onChange={V.ufAdmin} style={css("width:17px;height:17px;accent-color:"+accent)} />
                          <span>Administrator — darf die Benutzerverwaltung („Personal") öffnen</span>
                        </label>
                      </div>
                      {V.hasUserError && (
                        <div style={css("margin:0 26px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:#dc2626;font-size:13px")}>{V.userError}</div>
                      )}
                      <div style={css("display:flex;gap:12px;justify-content:flex-end;padding:18px 26px;border-top:1px solid #f0f1f3;background:#fafafa;margin-top:18px")}>
                        <button onClick={V.cancelUser} style={css("padding:11px 20px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14.5px;font-weight:600;color:#374151")}>Abbrechen</button>
                        <button onClick={V.saveUser} style={css(`padding:11px 24px;border:none;border-radius:10px;background:${accent};color:#fff;font-size:14.5px;font-weight:600`)}>Speichern</button>
                      </div>
                    </div>
                  )}

                  <div style={css("display:flex;align-items:center;gap:12px;margin-bottom:16px")}>
                    <div style={css("flex:1")}>
                      <div style={css("font-size:13.5px;color:#6b7280")}>{V.userCount} Mitarbeiter · Konten & Zugriff verwalten</div>
                    </div>
                    <button onClick={V.startUserCreate} style={css(`display:flex;align-items:center;gap:8px;padding:11px 18px;border:none;border-radius:11px;background:${accent};color:#fff;font-size:14.5px;font-weight:600;white-space:nowrap;box-shadow:0 6px 16px -9px ${accent}`)}><span style={css("font-size:17px")}>+</span> Neuer Mitarbeiter</button>
                  </div>

                  <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden")}>
                    <div style={css("display:grid;grid-template-columns:2fr 1.2fr 1fr 1.1fr;gap:12px;padding:12px 22px;background:#f9fafb;border-bottom:1px solid #f0f1f3;font-size:11.5px;font-weight:600;letter-spacing:.04em;color:#9ca3af;text-transform:uppercase")}>
                      <div>Mitarbeiter</div><div>Rolle</div><div>Zugriff</div><div style={css("text-align:right")}>Aktionen</div>
                    </div>
                    {V.personalUsers.map(u => (
                      <div key={u.id} style={css("display:grid;grid-template-columns:2fr 1.2fr 1fr 1.1fr;gap:12px;align-items:center;padding:13px 22px;border-bottom:1px solid #f4f5f7")}>
                        <div style={css("display:flex;align-items:center;gap:11px;min-width:0")}>
                          <div style={css(`width:34px;height:34px;border-radius:50%;flex:none;background:${u.avatarBg};color:${u.avatarFg};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px`)}>{u.initials}</div>
                          <div style={css("min-width:0")}>
                            <div style={css("font-size:14px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{u.name} {u.isSelf && <span style={css("font-size:11px;font-weight:600;color:#9ca3af")}>(du)</span>}</div>
                          </div>
                        </div>
                        <div style={css("font-size:13.5px;color:#374151")}>{u.role}</div>
                        <div>
                          {u.admin
                            ? <span style={css("font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:7px;background:#eef2ff;color:#4f46e5")}>Administrator</span>
                            : <span style={css("font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:7px;background:#f3f4f6;color:#6b7280")}>Standard</span>}
                        </div>
                        <div style={css("display:flex;gap:8px;justify-content:flex-end")}>
                          <Hx tag="button" onClick={u.onEdit} title={"Bearbeiten: "+u.name} css="padding:7px 13px;border:1.5px solid #e5e7eb;border-radius:9px;background:#fff;font-size:13px;font-weight:600;color:#374151" hover={`border-color:${accent};color:${accent}`}>Bearbeiten</Hx>
                          <Hx tag="button" onClick={u.onDelete} title={"Löschen: "+u.name} css="padding:7px 13px;border:1.5px solid #fecaca;border-radius:9px;background:#fff;font-size:13px;font-weight:600;color:#dc2626" hover="background:#fef2f2">Löschen</Hx>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={css("margin-top:10px;font-size:12px;color:#9ca3af")}>Hinweis: Demo-Daten werden lokal im Browser gespeichert (localStorage). Passwörter sind unverschlüsselt — im Produktivbetrieb übernimmt das ein sicherer Server.</div>
                </div>
                )}

              </main>
            </div>
          </div>
        )}

        {V.pwModal && (
          <div onClick={V.closePwModal} style={css("position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:60;animation:lpfade .2s ease")}>
            <div onClick={(e)=>e.stopPropagation()} style={{...css("width:420px;max-width:92vw;background:#fff;border-radius:16px;padding:26px 28px"), boxShadow:'0 24px 60px -20px rgba(15,23,42,.4)'}}>
              <div style={css("font-size:18px;font-weight:700;color:#111827")}>Passwort ändern</div>
              <div style={css("font-size:13px;color:#6b7280;margin:4px 0 18px")}>Eigenes Konto · {V.currentName}</div>
              <div style={css("display:flex;flex-direction:column;gap:14px")}>
                <div>
                  <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Aktuelles Passwort</div>
                  <Hx tag="input" value={V.pwCur} onChange={V.onPwCur} type="password" placeholder="aktuelles Passwort" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                </div>
                <div>
                  <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Neues Passwort</div>
                  <Hx tag="input" value={V.pwNew} onChange={V.onPwNew} type="password" placeholder="mind. 4 Zeichen" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                </div>
                <div>
                  <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Neues Passwort bestätigen</div>
                  <Hx tag="input" value={V.pwNew2} onChange={V.onPwNew2} onKeyDown={(e)=>{ if(e.key==='Enter') V.submitPwChange(); }} type="password" placeholder="wiederholen" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                </div>
              </div>
              {V.hasPwError && (
                <div style={css("margin-top:14px;padding:10px 14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;color:#dc2626;font-size:13px")}>{V.pwError}</div>
              )}
              <div style={css("display:flex;gap:12px;justify-content:flex-end;margin-top:22px")}>
                <button onClick={V.closePwModal} style={css("padding:11px 20px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14.5px;font-weight:600;color:#374151")}>Abbrechen</button>
                <button onClick={V.submitPwChange} style={css(`padding:11px 24px;border:none;border-radius:10px;background:${accent};color:#fff;font-size:14.5px;font-weight:600`)}>Speichern</button>
              </div>
            </div>
          </div>
        )}

        {V.toast && (
          <div style={{...css("position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:#0f172a;color:#fff;padding:12px 20px;border-radius:11px;font-size:14px;font-weight:500;animation:lptoast 2.6s ease forwards;z-index:50"), boxShadow:'0 16px 40px -12px rgba(15,23,42,.5)'}}>{V.toast}</div>
        )}

      </div>
    );
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <App companyName="Forming AG" accentColor="#2563eb" showAiTeaser={true} />
);
</script>
</body>
</html>
