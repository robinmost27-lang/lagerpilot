<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LagerPilot — Lagerverwaltung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
#root{height:100%}
::placeholder{color:#9ca3af}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.lp-scroll::-webkit-scrollbar{width:10px;height:10px}
.lp-scroll::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:6px;border:2px solid #fff}
@keyframes lpfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes lptoast{0%{opacity:0;transform:translateY(12px)}12%{opacity:1;transform:translateY(0)}88%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(12px)}}
@media print{ .lp-noprint{display:none!important} body *{visibility:hidden} .lp-print-area,.lp-print-area *{visibility:visible} .lp-print-area{position:fixed!important;left:50%!important;top:40px!important;transform:translateX(-50%)!important;border:none!important;box-shadow:none!important} }
/* Responsives Layout: Grids zusammenklappen, Sidebar einklappbar */
.lp-hamburger{display:none}
.lp-backdrop{display:none}
@media (max-width:1100px){
  .lp-grid-4{grid-template-columns:repeat(2,1fr)!important}
  .lp-grid-3{grid-template-columns:repeat(2,1fr)!important}
  .lp-grid-dash{grid-template-columns:1fr!important}
  .lp-grid-side{grid-template-columns:1fr!important}
  .lp-grid-2{grid-template-columns:1fr!important}
}
@media (max-width:760px){
  .lp-grid-4{grid-template-columns:1fr!important}
  .lp-grid-3{grid-template-columns:1fr!important}
  .lp-sidebar{position:fixed!important;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .22s ease}
  .lp-sidebar.lp-open{transform:translateX(0)}
  .lp-backdrop.lp-open{display:block;position:fixed;inset:0;background:rgba(15,23,42,.4);z-index:45}
  .lp-hamburger{display:flex!important}
  .lp-search-btn{display:none!important}
  .lp-main-pad{padding:16px!important}
}
</style>
</head>
<body>
<div id="root"></div>

  }
  relTime(d) {
    const diff = (Date.now() - d.getTime()) / 60000;
    if (diff < 1) return 'gerade eben';
    if (diff < 60) return Math.round(diff) + ' Min.';
    if (diff < 1440) return Math.round(diff / 60) + ' Std.';
    return Math.round(diff / 1440) + ' Tg.';
  }

    // Erst exakter Teilenummer-Treffer, dann Teil-Übereinstimmungen — sonst

    const p = this.state.parts.find(x => x.nummer.toLowerCase() === code) || this.state.parts.find(x => x.nummer.toLowerCase().includes(code)) || this.state.parts.find(x => x.bezeichnung.toLowerCase().includes(code));

      this.setState({
        bookPart: p,
        bookQty: 1,
        bookType: 'entnahme',
        scanError: '',
        scanCode: '',
        bookDone: null

      this.setState({

    const {
      bookPart,
      bookType,
      user
    } = this.state;
    if (!bookPart) return;
    // Über-Entnahme verhindern: bei Entnahme die Menge auf den vorhandenen
    // Bestand begrenzen, damit nie mehr gebucht wird als wirklich da ist.
    const reqQty = Math.max(1, this.state.bookQty || 1);
    const isEntnahme = bookType === 'entnahme';
    const qty = isEntnahme ? Math.min(reqQty, bookPart.bestand) : reqQty;
    if (isEntnahme && qty <= 0) {
      this.flash('Kein Bestand für eine Entnahme vorhanden');
      return;
    }
    const newBestand = isEntnahme ? bookPart.bestand - qty : bookPart.bestand + qty;
    const parts = this.state.parts.map(p => p.id === bookPart.id ? {
      ...p,
      bestand: newBestand
    } : p);
    const tx = {
      id: 't' + Date.now(),
      ts: new Date(),
      user: user.name,
      type: isEntnahme ? 'Entnahme' : 'Einlagerung',
      nummer: bookPart.nummer,
      bezeichnung: bookPart.bezeichnung,
      menge: qty,
      rest: newBestand
    };
    this.setState({
      parts,
      transactions: [tx, ...this.state.transactions],
      bookDone: {
        type: tx.type,
        menge: qty,
        einheit: bookPart.einheit,
        bezeichnung: bookPart.bezeichnung,
        rest: newBestand,
        nummer: bookPart.nummer

  recommendQty(p) {
    const target = Math.max(p.mindestbestand * 2, p.mindestbestand + 1);
    return Math.max(0, target - p.bestand);
  }
  verbrauch(nummer) {
    return this.state.transactions.filter(t => t.nummer === nummer && t.type === 'Entnahme').reduce((a, t) => a + t.menge, 0);

    const need = this.state.parts.filter(p => p.bestand < p.mindestbestand * 1.3);
    const sel = {},

    need.forEach(p => {
      sel[p.id] = true;
      qty[p.id] = this.recommendQty(p);
    });
    this.setState({
      reorderSel: sel,
      reorderQty: qty,
      reorderInit: true
    });
  };

      verbrauch: this.verbrauch(p.nummer)
    })).filter(p => p.menge > 0);
  }

  // Regelbasierter Bestellvorschlag (keine KI). Optimiert die Mengen aus
  // Bestand + Mindestbestand und rundet Normteile auf praktische Gebinde.
  runSuggestion = () => {
    const items = this.selectedOrderParts();
    if (!items.length) {
      this.flash('Bitte zuerst Teile auswählen');
      return;
    }
    const qty = {
      ...this.state.reorderQty
    };
    const reasons = [];
    items.forEach(p => {
      let m = this.recommendQty(p);
      const isNorm = /DIN|M\d|912|6885|6796|471|RSM/.test(p.nummer);
      if (isNorm) m = Math.ceil(m / 50) * 50 || 50;
      qty[p.id] = m;
      const grund = p.bestand === 0 ? 'leer — dringend auffüllen' : p.verbrauch > p.mindestbestand ? 'hoher Verbrauch gesamt' : 'auf Sollbestand auffüllen';
      reasons.push({
        bezeichnung: p.bezeichnung,
        nummer: p.nummer,
        menge: m,
        grund
      });
    });
    this.setState({
      reorderQty: qty,
      aiReasons: reasons,
      aiDone: true
    });
    this.flash('Bestellvorschlag berechnet');
  };
  buildEmailBody() {

  }
  // Echter Versand über das Mailprogramm des Nutzers (mailto:). Eine statische

  sendEmail = () => {

    const href = 'mailto:' + encodeURIComponent(recs.join(',')) + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(this.buildEmailBody());

  // --- Lagerplätze ---
  qrSvg(text, size) {
    try {
      const qr = qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      const c = qr.getModuleCount();
      const cell = size / c;
      let rects = '';
      for (let r = 0; r < c; r++) for (let col = 0; col < c; col++) if (qr.isDark(r, col)) rects += `<rect x="${(col * cell).toFixed(2)}" y="${(r * cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#0f172a">${rects}</g></svg>`;
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
    } catch (e) {
      return 'data:image/svg+xml;utf8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="#f3f4f6"/></svg>`);
    }
  }

  startEdit = () => {
    const p = this.state.parts.find(x => x.id === this.state.selectedPartId);
    this.setState({
      editing: true,
      editDraft: {
        ...p
      },
      editCatNew: !this.existingCats().includes(p.kategorie)
    });
  };
  startCreate = () => this.setState({
    view: 'detail',
    creating: true,
    editing: true,
    selectedPartId: null,
    editCatNew: false,
    editDraft: {
      id: 'new',
      nummer: '',
      bezeichnung: '',
      lagerplatz: '',
      bestand: 0,
      mindestbestand: 0,
      einheit: 'Stk',
      kategorie: this.existingCats()[0] || 'Verbindungselemente'
    }
  });
  editField = k => e => {
    let v = e.target.value;
    if (k === 'bestand' || k === 'mindestbestand') v = v === '' ? 0 : Math.max(0, parseInt(v, 10) || 0);
    this.setState({
      editDraft: {
        ...this.state.editDraft,
        [k]: v
      }
    });
  };
  editCatSelect = e => {
    const v = e.target.value;
    if (v === '__new__') this.setState({
      editCatNew: true,
      editDraft: {
        ...this.state.editDraft,
        kategorie: ''
      }
    });else this.setState({
      editCatNew: false,
      editDraft: {
        ...this.state.editDraft,
        kategorie: v
      }
    });
  };
  cancelEdit = () => {
    if (this.state.creating) this.setState({
      view: 'teile',
      editing: false,
      creating: false,
      editDraft: null
    });else this.setState({
      editing: false,
      editDraft: null
    });
  };
  saveEdit = () => {
    const d = this.state.editDraft;
    if (!d.nummer.trim() || !d.bezeichnung.trim()) {
      this.flash('Teilenummer und Bezeichnung sind Pflicht');
      return;
    }
    // Teilenummer muss eindeutig sein — doppelte Nummern brechen sonst
    // Buchung und Stücklisten-Auflösung (beide nehmen den ersten Treffer).
    const num = d.nummer.trim().toLowerCase();
    const dupe = this.state.parts.some(p => p.id !== d.id && p.nummer.trim().toLowerCase() === num);
    if (dupe) {
      this.flash('Teilenummer „' + d.nummer.trim() + '" existiert bereits');
      return;
    }
    const clean = {
      ...d,
      nummer: d.nummer.trim(),
      bezeichnung: d.bezeichnung.trim(),
      kategorie: (d.kategorie || '').trim() || 'Sonstige'
    };
    if (this.state.creating) {
      const id = 'p' + Date.now();
      this.setState({
        parts: [{
          ...clean,
          id
        }, ...this.state.parts],
        view: 'detail',
        selectedPartId: id,
        editing: false,
        creating: false,
        editDraft: null
      });
      this.flash('Teil angelegt: ' + clean.bezeichnung);
    } else {
      this.setState({
        parts: this.state.parts.map(p => p.id === d.id ? {
          ...clean
        } : p),
        editing: false,
        editDraft: null
      });
      this.flash('Änderungen gespeichert');
    }
  };
  deletePart = id => {
    const p = this.state.parts.find(x => x.id === id);
    if (!p) return;
    if (typeof window !== 'undefined' && window.confirm && !window.confirm('Teil „' + p.bezeichnung + '" wirklich löschen? Bestand und Verknüpfungen gehen verloren.')) return;
    this.setState({
      parts: this.state.parts.filter(x => x.id !== id),
      view: 'teile',
      selectedPartId: null,
      editing: false,
      creating: false,
      editDraft: null
    });
    this.flash('Teil gelöscht: ' + p.bezeichnung);
  };

  // --- Login / Registrierung ---
  pickLoginUser = id => this.setState({
    loginUser: id,
    authError: ''
  });
  doLogin = () => {
    const u = this.state.users.find(x => x.id === this.state.loginUser);
    if (!u) {
      this.setState({
        authError: 'Bitte zuerst einen Mitarbeiter wählen'
      });
      return;
    }
    if ((this.state.pin || '') !== (u.password || '')) {
      this.setState({
        authError: 'Falsches Passwort für ' + u.name
      });
      return;
    }
    this.setState({
      screen: 'app',
      user: u,
      view: 'dashboard',
      pin: '',
      authError: ''
    });
  };
  setLoginMode = m => this.setState({
    loginMode: m,
    authError: '',
    regError: '',
    reg: {
      name: '',
      role: 'Montage',
      pass: '',
      pass2: ''
    }
  });
  regField = k => e => this.setState({
    reg: {
      ...this.state.reg,
      [k]: e.target.value
    }
  });
  submitRegister = () => {
    const r = this.state.reg;
    if (!r.name.trim()) {
      this.setState({
        regError: 'Bitte Namen eingeben'
      });
      return;
    }
    if ((r.pass || '').length < 4) {
      this.setState({
        regError: 'Passwort muss mindestens 4 Zeichen haben'
      });
      return;
    }
    if (r.pass !== r.pass2) {
      this.setState({
        regError: 'Passwörter stimmen nicht überein'
      });
      return;
    }
    if (this.state.users.some(u => u.name.trim().toLowerCase() === r.name.trim().toLowerCase())) {
      this.setState({
        regError: 'Dieser Name existiert bereits'
      });
      return;
    }
    const u = {
      id: 'u' + Date.now(),
      name: r.name.trim(),
      role: r.role || 'Sonstige',
      initials: this.initialsOf(r.name),
      hue: Math.floor(Math.random() * 360),
      password: r.pass,
      admin: false
    };
    const users = [...this.state.users, u];
    this.saveUsers(users);
    this.setState({
      users,
      loginMode: 'login',
      loginUser: u.id,
      pin: '',
      regError: '',
      authError: ''
    });
    this.flash('Konto erstellt — jetzt mit deinem Passwort anmelden');
  };

  // --- Passwort ändern (eigenes Konto) ---
  openPwModal = () => this.setState({
    pwModal: true,
    pwCur: '',
    pwNew: '',
    pwNew2: '',
    pwError: ''
  });
  closePwModal = () => this.setState({
    pwModal: false,
    pwError: ''
  });
  submitPwChange = () => {
    const {
      pwCur,
      pwNew,
      pwNew2,
      user
    } = this.state;
    if (!user) return;
    if (pwCur !== user.password) {
      this.setState({
        pwError: 'Aktuelles Passwort ist falsch'
      });
      return;
    }
    if ((pwNew || '').length < 4) {
      this.setState({
        pwError: 'Neues Passwort muss mindestens 4 Zeichen haben'
      });
      return;
    }
    if (pwNew !== pwNew2) {
      this.setState({
        pwError: 'Neue Passwörter stimmen nicht überein'
      });
      return;
    }
    const users = this.state.users.map(u => u.id === user.id ? {
      ...u,
      password: pwNew
    } : u);
    this.saveUsers(users);
    this.setState({
      users,
      user: {
        ...user,
        password: pwNew
      },
      pwModal: false,
      pwError: ''
    });
    this.flash('Passwort geändert');
  };

  // --- Benutzerverwaltung (Personal) ---
  startUserCreate = () => this.setState({
    userEditing: true,
    userError: '',
    userDraft: {
      id: null,
      name: '',
      role: 'Montage',
      password: '',
      admin: false
    }
  });
  startUserEdit = id => {
    const u = this.state.users.find(x => x.id === id);
    if (u) this.setState({
      userEditing: true,
      userError: '',
      userDraft: {
        id: u.id,
        name: u.name,
        role: u.role,
        password: '',
        admin: !!u.admin
      }
    });
  };
  cancelUser = () => this.setState({
    userEditing: false,
    userDraft: null,
    userError: ''
  });
  userField = k => e => {
    const v = k === 'admin' ? e.target.checked : e.target.value;
    this.setState({
      userDraft: {
        ...this.state.userDraft,
        [k]: v
      }
    });
  };
  saveUser = () => {
    const d = this.state.userDraft;
    if (!d) return;
    if (!d.name.trim()) {
      this.setState({
        userError: 'Bitte Namen eingeben'
      });
      return;
    }
    const dupe = this.state.users.some(u => u.id !== d.id && u.name.trim().toLowerCase() === d.name.trim().toLowerCase());
    if (dupe) {
      this.setState({
        userError: 'Dieser Name existiert bereits'
      });
      return;
    }
    if (!d.id && (d.password || '').length < 4) {
      this.setState({
        userError: 'Passwort muss mindestens 4 Zeichen haben'
      });
      return;
    }
    let users,
      updatedSelf = null;
    if (d.id) {
      users = this.state.users.map(u => {
        if (u.id !== d.id) return u;
        const merged = {
          ...u,
          name: d.name.trim(),
          role: d.role,
          admin: !!d.admin,
          initials: this.initialsOf(d.name)
        };
        if ((d.password || '').length >= 4) merged.password = d.password;
        if (this.state.user && this.state.user.id === u.id) updatedSelf = merged;
        return merged;
      });
    } else {
      const u = {
        id: 'u' + Date.now(),
        name: d.name.trim(),
        role: d.role || 'Sonstige',
        initials: this.initialsOf(d.name),
        hue: Math.floor(Math.random() * 360),
        password: d.password,
        admin: !!d.admin
      };
      users = [...this.state.users, u];
    }
    // Es muss immer mindestens ein Admin übrig bleiben (auch nach „Bearbeiten").
    if (!users.some(u => u.admin)) {
      this.setState({
        userError: 'Mindestens ein Administrator muss bestehen bleiben'
      });
      return;
    }
    this.saveUsers(users);
    // Hat sich der angemeldete Admin selbst die Rechte genommen, darf er die
    // Personal-Seite nicht mehr sehen → zurück aufs Dashboard.
    const lostOwnAdmin = updatedSelf && !updatedSelf.admin && this.state.view === 'personal';
    this.setState({
      users,
      userEditing: false,
      userDraft: null,
      userError: '',
      ...(updatedSelf ? {
        user: updatedSelf
      } : {}),
      ...(lostOwnAdmin ? {
        view: 'dashboard'
      } : {})
    });
    this.flash(d.id ? 'Mitarbeiter aktualisiert: ' + d.name.trim() : 'Mitarbeiter angelegt: ' + d.name.trim());
  };
  deleteUser = id => {
    if (this.state.user && this.state.user.id === id) {
      this.flash('Das eigene Konto kann nicht gelöscht werden');
      return;
    }
    const remaining = this.state.users.filter(u => u.id !== id);
    if (!remaining.some(u => u.admin)) {
      this.flash('Mindestens ein Admin muss bestehen bleiben');
      return;
    }
    this.saveUsers(remaining);
    this.setState({
      users: remaining
    });
    this.flash('Mitarbeiter gelöscht');
  };
  componentDidUpdate(_, prev) {
    if (this.state.view === 'buchen' && prev.view !== 'buchen' && !this.state.bookPart && !this.state.bookDone) {
      setTimeout(() => {
        if (this.scanRef.current) this.scanRef.current.focus();
      }, 50);
    }
    if (this.state.view === 'baubarkeit' && prev.view !== 'baubarkeit' && !this.state.drawingId) {
      setTimeout(() => {
        if (this.drawingScanRef.current) this.drawingScanRef.current.focus();
      }, 50);
    }
    if (this.state.view === 'bestellung' && prev.view !== 'bestellung') this.ensureReorderInit();
    // Persistenz: Bestände, Buchungen und ausgelöste Bestellungen spiegeln.
    if (prev.parts !== this.state.parts) this.saveJSON('lp_parts', this.state.parts);
    if (prev.transactions !== this.state.transactions) this.saveJSON('lp_tx', this.state.transactions);
    if (prev.sentOrders !== this.state.sentOrders) this.saveJSON('lp_orders', this.state.sentOrders);
  }
  computeVals() {
    const s = this.state,
      accent = this.accent;
    const withStatus = p => {
      const st = this.statusOf(p);
      return {
        ...p,
        statusLabel: st.label,
        statusColor: st.color,
        statusBg: st.bg,
        statusKey: st.key,
        open: () => this.openPart(p.id)
      };
    };
    const partsS = s.parts.map(withStatus);
    const critical = partsS.filter(p => p.statusKey === 'kritisch' || p.statusKey === 'leer');
    const reorder = partsS.filter(p => p.statusKey === 'bald');
    const todayTx = s.transactions.filter(t => this.isToday(t.ts));
    const totalUnits = s.parts.reduce((a, p) => a + p.bestand, 0);

    // nav
    const mk = (key, label, badge) => ({
      key,
      label,
      onClick: () => this.go(key),
      bg: s.view === key ? accent : 'transparent',
      fg: s.view === key ? '#fff' : '#cbd5e1',
      dot: s.view === key ? '#fff' : '#475569',
      weight: s.view === key ? '600' : '500',
      badge: badge || null
    });
    const navItems = [mk('dashboard', 'Dashboard'), mk('buchen', 'Buchen'), mk('teile', 'Teile & Suche'), mk('baubarkeit', 'Baubarkeit'), mk('lagerplaetze', 'Lagerplätze'), mk('warnungen', 'Warnungen', critical.length || null), mk('bestellung', 'Nachbestellen'), mk('historie', 'Historie')];
    if (s.user && s.user.admin) navItems.push(mk('personal', 'Personal'));
    const titles = {
      dashboard: 'Dashboard',
      buchen: 'Buchen — Entnahme & Einlagerung',
      teile: 'Teile & Suche',
      baubarkeit: 'Baubarkeit — Zeichnung prüfen',
      lagerplaetze: 'Lagerplätze — QR-Codes & Inhalt',
      bestellung: 'Nachbestellen — Vorschlag & E-Mail',
      detail: s.creating ? 'Neues Teil anlegen' : 'Teil-Details',
      warnungen: 'Warnungen',
      historie: 'Transaktions-Historie',
      personal: 'Personal — Benutzerverwaltung'
    };
    const txView = t => {
      const u = this.userByName(t.user);
      const ein = t.type === 'Einlagerung';
      return {
        ...t,
        when: this.relTime(t.ts),
        whenFull: this.fmtTime(t.ts),
        sign: ein ? '+' : '–',
        tColor: ein ? '#15803d' : '#b45309',
        tBg: ein ? '#f0fdf4' : '#fffbeb',
        deltaLabel: (ein ? '+' : '−') + t.menge,
        uInit: u ? u.initials : '?',
        uHue: u ? u.hue : 220
      };
    };

    // detail
    const selPart = s.selectedPartId ? partsS.find(p => p.id === s.selectedPartId) : null;
    const selTx = selPart ? s.transactions.filter(t => t.nummer === selPart.nummer).map(txView) : [];

    // teile filtering
    const q = s.search.trim().toLowerCase();
    let listed = partsS.filter(p => !q || p.nummer.toLowerCase().includes(q) || p.bezeichnung.toLowerCase().includes(q) || p.lagerplatz.toLowerCase().includes(q));
    if (s.filterCat !== 'Alle') listed = listed.filter(p => p.kategorie === s.filterCat);
    listed = [...listed].sort((a, b) => s.sortKey === 'bestand' ? a.bestand - b.bestand : a[s.sortKey].localeCompare(b[s.sortKey]));
    const cats = ['Alle', ...Array.from(new Set(s.parts.map(p => p.kategorie)))];

    // buildability
    let drawingResult = null;
    if (s.drawingId) {
      const d = this.drawings.find(x => x.id === s.drawingId);
      if (d) {
        let lines = d.bom.map(b => {
          const part = s.parts.find(p => p.nummer === b.nummer);
          const avail = part ? part.bestand : 0;
          const possible = Math.floor(avail / b.menge);
          return {
            nummer: b.nummer,
            bezeichnung: part ? part.bezeichnung : b.nummer,
            lagerplatz: part ? part.lagerplatz : '—',
            mengePer: b.menge,
            avail,
            possible,
            einheit: part ? part.einheit : 'Stk',
            partId: part ? part.id : null
          };
        });
        const buildable = lines.length ? Math.min(...lines.map(l => l.possible)) : 0;
        const maxP = Math.max(1, ...lines.map(l => l.possible));
        lines = lines.map(l => ({
          ...l,
          limiting: l.possible === buildable,
          open: l.partId ? () => this.openPart(l.partId) : () => {},
          barPct: Math.round(l.possible / maxP * 100),
          rowBg: l.possible === buildable ? '#fef2f2' : '#fff',
          barColor: l.possible === buildable ? '#dc2626' : '#cbd5e1',
          possColor: l.possible === buildable ? '#dc2626' : '#374151'
        }));
        const limitNames = lines.filter(l => l.limiting).map(l => l.bezeichnung);
        drawingResult = {
          id: d.id,
          nummer: d.nummer,
          bezeichnung: d.bezeichnung,
          lines,
          buildable,
          partCount: d.bom.length,
          canBuild: buildable > 0,
          buildableColor: buildable === 0 ? '#dc2626' : buildable < 5 ? '#b45309' : '#15803d',
          buildableBg: buildable === 0 ? '#fef2f2' : buildable < 5 ? '#fffbeb' : '#f0fdf4',
          bannerBg: buildable === 0 ? '#fef2f2' : buildable < 5 ? '#fffbeb' : '#f0fdf4',
          bannerBorder: buildable === 0 ? '#fecaca' : buildable < 5 ? '#fde68a' : '#bbf7d0',
          limitNames: limitNames.join(', '),
          limitCount: limitNames.length
        };
      }
    }
    const cu = s.user || {};
    const avBg = h => `oklch(0.92 0.05 ${h})`,
      avFg = h => `oklch(0.45 0.13 ${h})`;
    return {
      accent,
      company: this.props.companyName || 'Müller Maschinenbau GmbH',
      showAi: this.props.showAiTeaser !== false,
      isLogin: s.screen === 'login',
      isApp: s.screen === 'app',
      toast: s.toast,
      // login
      isLoginMode: s.loginMode !== 'register',
      isRegisterMode: s.loginMode === 'register',
      showLogin: () => this.setLoginMode('login'),
      showRegister: () => this.setLoginMode('register'),
      users: s.users.map(u => ({
        ...u,
        select: () => this.pickLoginUser(u.id),
        borderColor: s.loginUser === u.id ? accent : '#e5e7eb',
        bgColor: s.loginUser === u.id ? '#eff6ff' : '#fff',
        avatarBg: avBg(u.hue),
        avatarFg: avFg(u.hue)
      })),
      pin: s.pin,
      onPin: e => this.setState({
        pin: e.target.value,
        authError: ''
      }),
      loginDisabled: !s.loginUser || !s.pin,
      loginBtnBg: s.loginUser && s.pin ? accent : '#cbd5e1',
      doLogin: this.doLogin,
      authError: s.authError,
      hasAuthError: !!s.authError,
      // registration
      regName: s.reg.name,
      regRole: s.reg.role,
      regPass: s.reg.pass,
      regPass2: s.reg.pass2,
      onRegName: this.regField('name'),
      onRegRole: this.regField('role'),
      onRegPass: this.regField('pass'),
      onRegPass2: this.regField('pass2'),
      regRoleOptions: this.roleOptions,
      submitRegister: this.submitRegister,
      regError: s.regError,
      hasRegError: !!s.regError,
      // shell
      navItems,
      pageTitle: titles[s.view] || 'Dashboard',
      navOpen: s.navOpen,
      toggleNav: this.toggleNav,
      closeNav: this.closeNav,
      currentName: cu.name || '',
      currentRole: cu.role || '',
      currentInitials: cu.initials || '',
      currentUserBg: avBg(cu.hue || 220),
      currentUserFg: avFg(cu.hue || 220),
      logout: () => this.setState({
        screen: 'login',
        user: null,
        loginUser: null,
        view: 'dashboard'
      }),
      goSearch: () => this.go('teile'),
      goBuchen: () => this.go('buchen'),
      goWarnungen: () => this.go('warnungen'),
      goHistorie: () => this.go('historie'),
      aiTeaser: () => this.go('bestellung'),
      // views
      isDashboard: s.view === 'dashboard',
      isBuchen: s.view === 'buchen',
      isTeile: s.view === 'teile',
      isDetail: s.view === 'detail',
      isWarnungen: s.view === 'warnungen',
      isHistorie: s.view === 'historie',
      // dashboard
      stats: [{
        label: 'Teile gesamt',
        value: s.parts.length,
        sub: totalUnits.toLocaleString('de-DE') + ' Einheiten',
        dot: accent,
        color: '#111827'
      }, {
        label: 'Kritische Teile',
        value: critical.length,
        sub: 'unter Mindestbestand',
        dot: '#dc2626',
        color: critical.length ? '#dc2626' : '#111827'
      }, {
        label: 'Bald bestellen',
        value: reorder.length,
        sub: 'Bestand niedrig',
        dot: '#d97706',
        color: reorder.length ? '#b45309' : '#111827'
      }, {
        label: 'Buchungen heute',
        value: todayTx.length,
        sub: 'Entnahmen & Einlagerungen',
        dot: '#15803d',
        color: '#111827'
      }],
      dashCritical: critical.slice(0, 6),
      noCritical: critical.length === 0,
      dashRecent: s.transactions.slice(0, 6).map(txView),
      // ---- Buchen ----
      scanCode: s.scanCode,
      onScanCode: e => this.setState({
        scanCode: e.target.value
      }),
      onScanKey: this.onScanKey,
      doScan: this.doScan,
      scanError: s.scanError,
      scanRef: this.scanRef,
      hasScanError: !!s.scanError,
      bookPart: s.bookPart ? withStatus(s.bookPart) : null,
      hasBookPart: !!s.bookPart,
      bookType: s.bookType,
      isEntnahme: s.bookType === 'entnahme',
      isEinlagerung: s.bookType === 'einlagerung',
      setEntnahme: () => this.setBookType('entnahme'),
      setEinlagerung: () => this.setBookType('einlagerung'),
      bookQty: s.bookQty,
      qtyMinus: () => this.bumpQty(-1),
      qtyPlus: () => this.bumpQty(1),
      onQty: e => {
        const v = parseInt(e.target.value, 10);
        this.setState({
          bookQty: isNaN(v) ? 1 : Math.max(1, v)
        });
      },
      qtyRef: this.qtyRef,
      bookTypeColor: s.bookType === 'entnahme' ? '#b45309' : '#15803d',
      scanPrompt: !s.bookPart && !s.bookDone,
      entnahmeBorder: s.bookType === 'entnahme' ? '#d97706' : '#e5e7eb',
      entnahmeBg: s.bookType === 'entnahme' ? '#fffbeb' : '#fff',
      entnahmeFg: s.bookType === 'entnahme' ? '#b45309' : '#374151',
      einBorder: s.bookType === 'einlagerung' ? '#16a34a' : '#e5e7eb',
