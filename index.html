// Parse a CSS declaration string into a React style object, so the design's
// inline styles can be reproduced verbatim.
function css(str){
  const o = {};
  if(!str) return o;
  String(str).split(';').forEach(decl => {
    const i = decl.indexOf(':');
    if(i < 0) return;
    let k = decl.slice(0, i).trim();
    const v = decl.slice(i + 1).trim();
    if(!k) return;
    k = k.replace(/-([a-z])/g, (_, c) => c.toUpperCase());
    o[k] = v;
  });
  return o;
}

// Hoverable / focusable element wrapper — reproduces the design's
// style-hover / style-focus pseudo-states. Forwards a DOM ref via innerRef.
class Hx extends React.Component {
  constructor(p){ super(p); this.state = { h:false, f:false }; }
  render(){
    const { tag='div', css:c, hover, focus, innerRef, children,
            onMouseEnter, onMouseLeave, onFocus, onBlur, ...rest } = this.props;
    const style = {
      ...css(c),
      ...(this.state.h && hover ? css(hover) : null),
      ...(this.state.f && focus ? css(focus) : null),
    };
    return React.createElement(tag, {
      ...rest,
      ref: innerRef,
      style,
      onMouseEnter:(e)=>{ this.setState({h:true}); onMouseEnter && onMouseEnter(e); },
      onMouseLeave:(e)=>{ this.setState({h:false}); onMouseLeave && onMouseLeave(e); },
      onFocus:(e)=>{ this.setState({f:true}); onFocus && onFocus(e); },
      onBlur:(e)=>{ this.setState({f:false}); onBlur && onBlur(e); },
    }, children);
  }
}

  flash(msg) { this.setState({ toast: msg }); clearTimeout(this._tt); this._tt = setTimeout(()=>this.setState({toast:''}), 2600); }

  // ---- actions ----
  go = (v) => { this.stopCam(); this.setState({ view: v, selectedPartId: v==='detail'?this.state.selectedPartId:null, editing:false, creating:false, navOpen:false }); };
  toggleNav = () => this.setState(s => ({ navOpen: !s.navOpen }));
  closeNav = () => this.setState({ navOpen:false });
  openPart = (id) => this.setState({ view:'detail', selectedPartId:id, editing:false, creating:false });

  doScan = () => {
    const code = (this.state.scanCode||'').trim().toLowerCase();
    if (!code) return;
    // Erst exakter Teilenummer-Treffer, dann Teil-Übereinstimmungen — sonst
    // würde eine Teileingabe das falsche Teil greifen.
    const p = this.state.parts.find(x => x.nummer.toLowerCase()===code)
           || this.state.parts.find(x => x.nummer.toLowerCase().includes(code))
           || this.state.parts.find(x => x.bezeichnung.toLowerCase().includes(code));
    if (p) { this.setState({ bookPart:p, bookQty:1, bookType:'entnahme', scanError:'', scanCode:'', bookDone:null }, ()=>{ if(this.qtyRef.current) this.qtyRef.current.focus(); }); }
    else { this.setState({ scanError:'Kein Teil zu „'+this.state.scanCode+'" gefunden', scanCode:'' }, ()=>{ if(this.scanRef.current) this.scanRef.current.focus(); }); }
  };
  onScanKey = (e) => { if (e.key==='Enter') this.doScan(); };

  setBookType = (t) => this.setState({ bookType:t });
  bumpQty = (d) => this.setState(s => ({ bookQty: Math.max(1, (s.bookQty||1)+d) }));

  confirmBooking = () => {
    const { bookPart, bookType, user } = this.state;
    if (!bookPart) return;
    // Über-Entnahme verhindern: bei Entnahme die Menge auf den vorhandenen
    // Bestand begrenzen, damit nie mehr gebucht wird als wirklich da ist.
    const reqQty = Math.max(1, this.state.bookQty||1);
    const isEntnahme = bookType==='entnahme';
    const qty = isEntnahme ? Math.min(reqQty, bookPart.bestand) : reqQty;
    if (isEntnahme && qty <= 0) { this.flash('Kein Bestand für eine Entnahme vorhanden'); return; }
    const newBestand = isEntnahme ? bookPart.bestand - qty : bookPart.bestand + qty;
    const updatedPart = { ...bookPart, bestand:newBestand, geaendertAm:new Date().toISOString() };
    const parts = this.state.parts.map(p => p.id===bookPart.id ? updatedPart : p);
    const tx = { id:'t'+Date.now(), ts:new Date(), user:user.name, type: isEntnahme?'Entnahme':'Einlagerung', nummer:bookPart.nummer, bezeichnung:bookPart.bezeichnung, menge:qty, rest:newBestand };
    this.setState({ parts, transactions:[tx, ...this.state.transactions],
      bookDone:{ type:tx.type, menge:qty, einheit:bookPart.einheit, bezeichnung:bookPart.bezeichnung, rest:newBestand, nummer:bookPart.nummer }, bookPart:null });
    // Cloud-Sync: geänderten Bestand + Buchung hochschieben (no-op wenn Sync aus).
    this.pushPart(updatedPart); this.pushBooking(tx);
    this.flash(tx.type+' gebucht: '+qty+'× '+bookPart.bezeichnung);
  };
  newBooking = () => this.setState({ bookDone:null, bookPart:null, scanError:'' }, ()=>{ if(this.scanRef.current) this.scanRef.current.focus(); });
  cancelBook = () => this.setState({ bookPart:null, scanError:'' }, ()=>{ if(this.scanRef.current) this.scanRef.current.focus(); });

  // --- Nachbestellen ---
  recommendQty(p) { const target = Math.max(p.mindestbestand*2, p.mindestbestand+1); return Math.max(0, target - p.bestand); }
  verbrauch(nummer) { return this.state.transactions.filter(t=>t.nummer===nummer && t.type==='Entnahme').reduce((a,t)=>a+t.menge,0); }
  ensureReorderInit = () => {
    if (this.state.reorderInit) return;
    const need = this.state.parts.filter(p => p.bestand < p.mindestbestand*1.3);
    const sel={}, qty={};
    need.forEach(p => { sel[p.id]=true; qty[p.id]=this.recommendQty(p); });
    this.setState({ reorderSel:sel, reorderQty:qty, reorderInit:true });
  };
  toggleReorder = (id) => this.setState(s => ({ reorderSel:{...s.reorderSel, [id]: !(s.reorderSel[id]!==false)} }));
  setReorderQty = (id) => (e) => { const v=parseInt(e.target.value,10); this.setState(s=>({ reorderQty:{...s.reorderQty,[id]:isNaN(v)?0:Math.max(0,v)} })); };
  toggleRecipient = (id) => this.setState(s => ({ recipients:s.recipients.map(r=>r.id===id?{...r,sel:!r.sel}:r) }));
  setOrderTab = (t) => this.setState({ orderTab:t });

  selectedOrderParts() {
    return this.state.parts
      .filter(p => p.bestand < p.mindestbestand*1.3)
      .filter(p => this.state.reorderSel[p.id]!==false)
      .map(p => ({ ...p, menge: this.state.reorderQty[p.id]!==undefined ? this.state.reorderQty[p.id] : this.recommendQty(p), verbrauch:this.verbrauch(p.nummer) }))
      .filter(p => p.menge>0);
  }

  // Regelbasierter Bestellvorschlag (keine KI). Optimiert die Mengen aus
  // Bestand + Mindestbestand und rundet Normteile auf praktische Gebinde.
  runSuggestion = () => {
    const items = this.selectedOrderParts();
    if (!items.length) { this.flash('Bitte zuerst Teile auswählen'); return; }
    const qty = {...this.state.reorderQty}; const reasons=[];
    items.forEach(p => { let m = this.recommendQty(p);
      const isNorm = /DIN|M\d|912|6885|6796|471|RSM/.test(p.nummer);
      if (isNorm) m = Math.ceil(m/50)*50 || 50;
      qty[p.id]=m;
      const grund = p.bestand===0 ? 'leer — dringend auffüllen' : (p.verbrauch>p.mindestbestand ? 'hoher Verbrauch gesamt' : 'auf Sollbestand auffüllen');
      reasons.push({ bezeichnung:p.bezeichnung, nummer:p.nummer, menge:m, grund });
    });
    this.setState({ reorderQty:qty, aiReasons:reasons });
    this.flash('Bestellvorschlag berechnet');
  };

  currentSupplier() { return this.state.lieferanten.find(s => s.id === this.state.supplierId) || null; }
  buildEmailBody(bnr) {
    const items = this.selectedOrderParts();
    const sup = this.currentSupplier();
    const supBlock = sup ? 'Lieferant: '+sup.name+'\nKundennummer: '+sup.kundennummer+(sup.rabatt?'\nKonditionen/Rabatt: '+sup.rabatt:'')+'\n\n' : '';
    const head = 'Bestellnummer: '+bnr+'\n(Bitte in Antworten und Auftragsbestätigungen angeben)\n\n'+supBlock+'Bitte folgende Teile nachbestellen:\n\n';
    const rows = items.map(p => `• ${p.menge} ${p.einheit}  ${p.bezeichnung}  (${p.nummer})  — aktueller Bestand ${p.bestand}, Mindestbestand ${p.mindestbestand}`).join('\n');
    const note = this.state.emailNote.trim() ? `\n\nNotiz: ${this.state.emailNote.trim()}` : '';
    return head + rows + note + `\n\nGesendet von ${this.state.user?this.state.user.name:''} · LagerPilot`;
  }
  // Eindeutige Bestellnummer — steht im Betreff, damit n8n Antwort-Mails
  // (Bestätigung, Versand) automatisch der Bestellung zuordnen kann.
  makeBestellnummer() {
    const d = new Date(); const pad = x => String(x).padStart(2,'0');
    return 'LP-'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'-'+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
  }
  // Echter Versand über das Mailprogramm des Nutzers (mailto:). Eine statische
  // Seite kann selbst keine Mail verschicken — so wird „Senden" aber real.
  // Zusätzlich (falls konfiguriert): Bestellung bei n8n registrieren fürs Tracking.
  sendEmail = () => {
    const items = this.selectedOrderParts();
    if (!items.length) { this.flash('Bitte zuerst Teile auswählen'); return; }
    const recs = this.state.recipients.filter(r=>r.sel).map(r=>r.email);
    if (this.state.customEmail.trim()) recs.push(this.state.customEmail.trim());
    if (!recs.length) { this.flash('Bitte mindestens einen Empfänger wählen'); return; }
    const bnr = this.makeBestellnummer();
    const subject = 'Nachbestellung '+bnr+' — '+items.length+' Positionen';
    const href = 'mailto:'+encodeURIComponent(recs.join(','))+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(this.buildEmailBody(bnr));
    try { window.location.href = href; } catch(e) {}
    const sup = this.currentSupplier();
    const order = { id:'o'+Date.now(), ts:new Date(), method:'E-Mail', to:recs, count:items.length, bestellnummer:bnr,
      lieferant: sup ? sup.name : '', kundennummer: sup ? sup.kundennummer : '',
      totalMenge:items.reduce((a,p)=>a+p.menge,0), parts:items.map(p=>({nummer:p.nummer,bezeichnung:p.bezeichnung,menge:p.menge,einheit:p.einheit})),
      user:this.state.user?this.state.user.name:'' };
    this.setState({ sentOrders:[order, ...this.state.sentOrders], orderTab:'gesendet' });
    if (this.state.n8nBase) {
      fetch(this.state.n8nBase+'/lagerpilot/order', { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ bestellnummer:bnr, ts:new Date().toISOString(), user:order.user, to:recs.join(', '),
          lieferant:order.lieferant, kundennummer:order.kundennummer, positionen:order.parts }) })
        .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); })
        .catch(() => this.flash('Hinweis: n8n nicht erreichbar — Bestellung ohne Tracking-Eintrag'));
    }
    this.flash('E-Mail-Programm geöffnet — bitte dort senden');
  };

  // --- Phase 2: Bestell-Tracking (n8n + Google Sheets) ---
  saveN8n = () => {
    const v = (this.state.n8nDraft||'').trim().replace(/\/+$/,'');
    this.saveJSON('lp_n8n_base', v);
    this.setState({ n8nBase:v, trackError:'' }, () => { if (v) this.fetchTrack(); });
    this.flash(v ? 'n8n-Adresse gespeichert' : 'n8n-Adresse entfernt — Tracking aus');
  };
  fetchTrack = async () => {
    if (!this.state.n8nBase) return;
    this.setState({ trackBusy:true, trackError:'' });
    try {
      const r = await fetch(this.state.n8nBase+'/lagerpilot/orders');
      if (!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      const rows = Array.isArray(data) ? data : (data.orders || []);
      const map = {};
      rows.forEach(o => { if (o && o.Bestellnummer) map[o.Bestellnummer] = o; });
      this.setState({ track:map, trackBusy:false });
    } catch(e) {
      this.setState({ trackBusy:false, trackError:'Status-Abruf fehlgeschlagen ('+e.message+') — läuft n8n und stimmt die Adresse?' });
    }
  };

  // --- Phase 3: Mehrgeräte-Bestandssync (Teile + Buchungen über n8n/Google Sheets) ---
  // Grundprinzip: localStorage bleibt der sofortige, offline-sichere Speicher.
  // Jede Mutation wird zusätzlich in die Cloud gepusht; Fehler wandern in eine
  // Warteschlange. Ein Pull holt Änderungen anderer Geräte. Reihenfolge beim
  // Abgleich: erst wartende Pushes raus, dann ziehen (sonst Datenverlust offline).
  cloudOn() { return !!this.state.n8nBase && this.state.syncOn; }
  savePending() { this.saveJSON('lp_pending', this._pending); }
  enqueue(item) { this._pending.push(item); this.savePending(); }
  partBody(p, deleted) {
    return { id:p.id, nummer:p.nummer, bezeichnung:p.bezeichnung, lagerplatz:p.lagerplatz,
      bestand:p.bestand, mindestbestand:p.mindestbestand, einheit:p.einheit||'Stk', kategorie:p.kategorie||'',
      geloescht:deleted?'1':'', geaendertAm:p.geaendertAm||new Date().toISOString() };
  }
  // Ein Teil schreiben (anlegen/ändern/Soft-Delete). Bei Fehler → Warteschlange.
  pushPart = async (p, opts) => {
    if (!this.cloudOn()) return;
    const body = this.partBody(p, opts&&opts.deleted);
    try {
      const r = await fetch(this.state.n8nBase+'/lagerpilot/part', { method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      if (!r.ok) throw new Error('HTTP '+r.status);
    } catch(e) { this.enqueue({ kind:'part', body }); }
  };
  // Buchung als History-Eintrag protokollieren (reines Log; Bestand pflegt pushPart).
  pushBooking = async (tx) => {
    if (!this.cloudOn()) return;
    const body = { id:tx.id, ts:(tx.ts instanceof Date?tx.ts.toISOString():tx.ts), user:tx.user,
      typ:tx.type, nummer:tx.nummer, bezeichnung:tx.bezeichnung, menge:tx.menge, rest:tx.rest, partId:'' };
    try {
      const r = await fetch(this.state.n8nBase+'/lagerpilot/booking', { method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      if (!r.ok) throw new Error('HTTP '+r.status);
    } catch(e) { this.enqueue({ kind:'booking', body }); }
  };
  // Ein Benutzerkonto in die Cloud schreiben (anlegen/ändern/Soft-Delete).
  userBody(u, deleted) {
    return { id:u.id, name:u.name||'', role:u.role||'', email:u.email||'', password:u.password||'',
      initials:u.initials||'', hue:(u.hue!=null?u.hue:0), admin:u.admin?'1':'',
      geloescht:deleted?'1':'', geaendertAm:u.geaendertAm||new Date().toISOString() };
  }
  pushUser = async (u, opts) => {
    if (!this.cloudOn()) return;
    const body = this.userBody(u, opts&&opts.deleted);
    try {
      const r = await fetch(this.state.n8nBase+'/lagerpilot/user', { method:'POST',
        headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
      if (!r.ok) throw new Error('HTTP '+r.status);
    } catch(e) { this.enqueue({ kind:'user', body }); }
  };
  // Cloud-Benutzer in die lokale Liste mergen. Wird auch schon auf dem
  // Login-Bildschirm genutzt, damit registrierte Konten dort auswählbar sind.
  applyCloudUsers = (cloudUsers) => {
    if (!Array.isArray(cloudUsers)) return;
    const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
    const pendU = {}; this._pending.forEach(it => { if(it.body && it.kind==='user') pendU[it.body.id]=1; });
    if (cloudUsers.length===0) {
      // Cloud noch leer → lokale Konten einmalig zum Hochladen einreihen.
      if (this.state.users.length) this.state.users.forEach(u => this.enqueue({ kind:'user', body:this.userBody(u, false) }));
      return;
    }
    const uById = {}; this.state.users.forEach(u => { uById[u.id] = { ...u }; });
    cloudUsers.forEach(c => {
      if (pendU[c.ID]) return;
      const del = String(c.Geloescht||'').trim() && String(c.Geloescht).trim()!=='0';
      if (del) { delete uById[c.ID]; return; }
      uById[c.ID] = { id:c.ID, name:c.Name||'', role:c.Rolle||'', email:c.Email||'', password:c.Passwort||'',
        initials:c.Initialen||'', hue:num(c.Hue), admin: !!(String(c.Admin||'').trim() && String(c.Admin).trim()!=='0'), geaendertAm:c.GeaendertAm||'' };
    });
    const users = Object.keys(uById).map(k => uById[k]);
    this.saveUsers(users);
    this.setState({ users });
  };
  // Nur Benutzer holen (leichtgewichtig; tolerant — Endpunkt existiert evtl. nicht).
  pullUsers = async () => {
    if (!this.cloudOn()) return;
    try {
      const ur = await fetch(this.state.n8nBase+'/lagerpilot/users');
      if (!ur.ok) return;
      const ud = await ur.json();
      this.applyCloudUsers((Array.isArray(ud)?ud:(ud.users||[])).filter(x => x && x.ID));
    } catch(e) {}
  };
  // Wartende Pushes der Reihe nach abarbeiten; Fehlgeschlagene bleiben stehen.
  flushPending = async () => {
    if (!this.cloudOn() || !this._pending.length) return;
    const queue = this._pending.slice(); const keep = [];
    for (const item of queue) {
      const path = item.kind==='booking' ? '/lagerpilot/booking' : (item.kind==='user' ? '/lagerpilot/user' : '/lagerpilot/part');
      try {
        const r = await fetch(this.state.n8nBase+path, { method:'POST',
          headers:{'Content-Type':'application/json'}, body:JSON.stringify(item.body) });
        if (!r.ok) throw new Error('HTTP '+r.status);
      } catch(e) { keep.push(item); }
    }
    this._pending = keep; this.savePending();
  };
  // Cloud → App: Teile (autoritativ bei Überschneidung) und Buchungen (Vereinigung).
  pullCloud = async () => {
    const base = this.state.n8nBase;
    const [pr, br] = await Promise.all([ fetch(base+'/lagerpilot/parts'), fetch(base+'/lagerpilot/bookings') ]);
    if (!pr.ok) throw new Error('parts HTTP '+pr.status);
    if (!br.ok) throw new Error('bookings HTTP '+br.status);
    const pd = await pr.json(); const bd = await br.json();
    const cloudParts = (Array.isArray(pd)?pd:(pd.parts||[])).filter(x => x && x.ID);
    const cloudBooks = (Array.isArray(bd)?bd:(bd.bookings||[])).filter(x => x && x.BuchungsID);
    const num = v => { const n = parseInt(v,10); return isNaN(n)?0:n; };
    // Noch nicht gepushte lokale Teile/Buchungen behalten Vorrang (Benutzer: in pullUsers).
    const pendP = {}, pendB = {};
    this._pending.forEach(it => { if(it.body){ if(it.kind==='part') pendP[it.body.id]=1; else if(it.kind==='booking') pendB[it.body.id]=1; } });
    // Teile: lokal als Basis, Cloud überschreibt/ergänzt/entfernt (außer bei offenem Push).
    const byId = {}; this.state.parts.forEach(p => { byId[p.id] = { ...p }; });
    cloudParts.forEach(c => {
      if (pendP[c.ID]) return;
      const del = String(c.Geloescht||'').trim() && String(c.Geloescht).trim()!=='0';
      if (del) { delete byId[c.ID]; return; }
      byId[c.ID] = { id:c.ID, nummer:c.Nummer||'', bezeichnung:c.Bezeichnung||'', lagerplatz:c.Lagerplatz||'',
        bestand:num(c.Bestand), mindestbestand:num(c.Mindestbestand), einheit:c.Einheit||'Stk',
        kategorie:c.Kategorie||'', geaendertAm:c.GeaendertAm||'' };
    });
    const parts = Object.keys(byId).map(k => byId[k]);
    // Buchungen vereinigen (Schlüssel = BuchungsID), neueste zuerst.
    const seen = {}; const merged = [];
    this.state.transactions.forEach(t => { if (t && t.id) { seen[t.id]=1; merged.push(t); } });
    cloudBooks.forEach(c => {
      if (seen[c.BuchungsID]) return; seen[c.BuchungsID]=1;
      merged.push({ id:c.BuchungsID, ts:new Date(c.Zeit||Date.now()), user:c.Benutzer||'', type:c.Typ||'',
        nummer:c.Nummer||'', bezeichnung:c.Bezeichnung||'', menge:num(c.Menge),
        rest:(c.Rest===''||c.Rest==null)?'':num(c.Rest) });
    });
    merged.sort((a,b) => new Date(b.ts) - new Date(a.ts));
    this.setState({ parts, transactions:merged });
    // Benutzerkonten separat mergen (tolerant; dieselbe Logik wie auf dem Login-Screen).
    await this.pullUsers();
  };
  // Vollständiger Abgleich: erst pushen, dann ziehen.
  syncNow = async (opts) => {
    if (!this.cloudOn() || this._syncing) return;
    this._syncing = true;
    if (!(opts&&opts.silent)) this.setState({ syncBusy:true, syncError:'' });
    try {
      await this.flushPending();
      await this.pullCloud();
      const now = new Date().toISOString();
      this.saveJSON('lp_last_sync', now);
      this.setState({ syncBusy:false, syncError:'', lastSync:now });
    } catch(e) {
      this.setState({ syncBusy:false, syncError:'Abgleich fehlgeschlagen ('+e.message+'). Läuft das Backend? Einmalig 15_phase3_backend.command ausführen.' });
    } finally { this._syncing = false; }
  };
  // Erstsync: alle lokalen Teile in die (noch leere) Cloud hochladen.
  seedCloud = () => {
    this.state.parts.forEach(p => this.enqueue({ kind:'part', body:this.partBody(p, false) }));
    this.state.users.forEach(u => this.enqueue({ kind:'user', body:this.userBody(u, false) }));
    this.syncNow();
  };
  startSync = () => {
    if (this._syncTimer) return;
    this._onFocus = () => {
      if (!this.cloudOn()) return;
      if (this.state.screen==='app') this.syncNow({ silent:true });
      else this.pullUsers(); // Login-Screen: registrierte Konten aktuell halten
    };
    window.addEventListener('focus', this._onFocus);
    this._syncTimer = setInterval(() => {
      if (this.state.screen==='app' && this.cloudOn()) this.syncNow({ silent:true });
    }, 45000);
  };
  stopSync = () => {
    if (this._syncTimer) { clearInterval(this._syncTimer); this._syncTimer = null; }
    if (this._onFocus) { window.removeEventListener('focus', this._onFocus); this._onFocus = null; }
  };
  toggleSync = () => {
    const on = !this.state.syncOn; this.saveJSON('lp_sync', on);
    this.setState({ syncOn:on, syncError:'' }, () => {
      if (on) { this.startSync(); if (!this.state.lastSync) this.seedCloud(); else this.syncNow(); }
      else this.stopSync();
    });
    this.flash(on ? 'Cloud-Sync aktiviert' : 'Cloud-Sync deaktiviert — nur noch lokal');
  };
  lastSyncLabel() {
    if (!this.state.lastSync) return 'noch nie';
    const d = new Date(this.state.lastSync); if (isNaN(d.getTime())) return '—';
    const diff = Math.round((Date.now()-d.getTime())/1000);
    if (diff < 60) return 'gerade eben';
    if (diff < 3600) return 'vor '+Math.round(diff/60)+' Min';
    const pad = x => String(x).padStart(2,'0');
    return pad(d.getHours())+':'+pad(d.getMinutes())+' Uhr';
  }

  // --- Lieferanten & Kundennummern ---
  setSupplier = (e) => this.setState({ supplierId: e.target.value });
  toggleSupNew = () => this.setState(s => ({ supNew: !s.supNew, supDraft:{ name:'', kundennummer:'', rabatt:'' } }));
  supField = (k) => (e) => this.setState({ supDraft:{ ...this.state.supDraft, [k]: e.target.value } });
  addSupplier = () => {
    const d = this.state.supDraft;
    if (!d.name.trim() || !d.kundennummer.trim()) { this.flash('Name und Kundennummer sind Pflicht'); return; }
    const s = { id:'s'+Date.now(), name:d.name.trim(), kundennummer:d.kundennummer.trim(), rabatt:(d.rabatt||'').trim() };
    const list = [...this.state.lieferanten, s];
    this.saveJSON('lp_suppliers', list);
    this.setState({ lieferanten:list, supplierId:s.id, supNew:false, supDraft:{ name:'', kundennummer:'', rabatt:'' } });

  delSupplier = (id) => {

  pickDelivery = (bnr) => { this._deliveryBnr = bnr; if (this.fileRef.current) this.fileRef.current.click(); };
  onDeliveryFile = (e) => {
    const f = e.target.files && e.target.files[0]; e.target.value = '';
    const bnr = this._deliveryBnr; if (!f || !bnr) return;
    const img = new Image(); const url = URL.createObjectURL(f);
    img.onload = () => {
      const max = 1400; const sc = Math.min(1, max/Math.max(img.width, img.height));
      const c = document.createElement('canvas'); c.width = Math.round(img.width*sc); c.height = Math.round(img.height*sc);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(url);
      this.postDelivery(bnr, c.toDataURL('image/jpeg', 0.85).split(',')[1]);
    };
    img.onerror = () => { URL.revokeObjectURL(url); this.flash('Bild konnte nicht gelesen werden'); };

  postDelivery = async (bnr, b64) => {
    this.setState({ trackBusy:true, trackError:'' });

      const r = await fetch(this.state.n8nBase+'/lagerpilot/delivery', { method:'POST', headers:{'Content-Type':'application/json'},

  // --- Lagerplätze ---
  qrSvg(text, size) {
    try {
      const qr = qrcode(0, 'M'); qr.addData(text); qr.make();
      const c = qr.getModuleCount(); const cell = size / c; let rects = '';
      for (let r=0;r<c;r++) for (let col=0;col<c;col++) if (qr.isDark(r,col)) rects += `<rect x="${(col*cell).toFixed(2)}" y="${(r*cell).toFixed(2)}" width="${cell.toFixed(2)}" height="${cell.toFixed(2)}"/>`;
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}"><rect width="${size}" height="${size}" fill="#fff"/><g fill="#0f172a">${rects}</g></svg>`;
      return 'data:image/svg+xml;utf8,'+encodeURIComponent(svg);
    } catch(e) { return 'data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="#f3f4f6"/></svg>`); }
  }
  doBinScan = () => {
    const code = (this.state.binQuery||'').trim().toUpperCase();
    if (!code) return;
    const norm = code.replace(/^LAGERPLATZ:/,'').trim();
    const exists = this.state.parts.some(p => p.lagerplatz.toUpperCase()===norm);
    if (exists) this.setState({ binCode:norm, binError:'', binQuery:'' });
    else this.setState({ binError:'Kein Lagerplatz „'+this.state.binQuery+'" gefunden', binQuery:'' }, ()=>{ if(this.binScanRef.current) this.binScanRef.current.focus(); });
  };
  onBinKey = (e) => { if (e.key==='Enter') this.doBinScan(); };
  clearBin = () => this.setState({ binCode:null, binError:'' }, ()=>{ if(this.binScanRef.current) this.binScanRef.current.focus(); });
  setBinMode = (m) => { this.stopCam(); this.setState({ binMode:m, binError:'' }); };
  printBin = () => { setTimeout(()=>window.print(), 60); };

  // --- Kamera-QR-Scan: nutzt die Gerätekamera und dekodiert lokal mit jsQR.
  // Funktioniert nur über HTTPS (oder localhost) und nach Kamera-Freigabe —
  // andernfalls gibt es eine klare Fehlermeldung statt einer Attrappe.
  startCam = () => {
    if (!window.jsQR) { this.setState({ camError:'Scanner-Bibliothek nicht geladen — Internetverbindung prüfen und Seite neu laden.' }); return; }
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { this.setState({ camError:'Dieser Browser erlaubt hier keinen Kamerazugriff. Hinweis: Kamera funktioniert nur über HTTPS.' }); return; }
    this.setState({ camActive:true, camError:'', binError:'' }, async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'environment' }, audio:false });
        this._camStream = stream;
        const v = this.videoRef.current;
        if (!v) { this.stopCam(); return; }
        v.srcObject = stream;
        await v.play();
        this._camCanvas = this._camCanvas || document.createElement('canvas');
        this._camTimer = setInterval(this.scanFrame, 300);
      } catch(e) {
        this.stopCam();
        this.setState({ camError:'Kamera nicht verfügbar ('+(e.name||'Fehler')+'). Bitte Kamerazugriff erlauben — er funktioniert nur über HTTPS.' });
      }
    });
  };
  stopCam = () => {
    if (this._camTimer) { clearInterval(this._camTimer); this._camTimer = null; }
    if (this._camStream) { this._camStream.getTracks().forEach(t=>t.stop()); this._camStream = null; }
    if (this.state.camActive) this.setState({ camActive:false });
  };
  scanFrame = () => {
    const v = this.videoRef.current;
    if (!v || v.readyState < 2 || !v.videoWidth) return;
    const c = this._camCanvas; c.width = v.videoWidth; c.height = v.videoHeight;
    const ctx = c.getContext('2d', { willReadFrequently:true });
    ctx.drawImage(v, 0, 0);
    const img = ctx.getImageData(0, 0, c.width, c.height);
    let code = null;
    try { code = window.jsQR(img.data, img.width, img.height); } catch(e) {}
    if (code && code.data) {
      this.stopCam();
      const norm = String(code.data).trim().toUpperCase().replace(/^LAGERPLATZ:/,'').trim();
      const exists = this.state.parts.some(p => p.lagerplatz.toUpperCase()===norm);
      if (exists) { this.setState({ binCode:norm, binError:'', binQuery:'' }); this.flash('Lagerplatz erkannt: '+norm); }
      else this.setState({ binError:'Kein Lagerplatz zu QR-Code „'+code.data+'" gefunden' });
    }
  };

  // --- Baubarkeit ---
  doDrawingScan = () => {
    const code = (this.state.drawingQuery||'').trim().toLowerCase();
    if (!code) return;
    const d = this.drawings.find(x => x.nummer.toLowerCase()===code)
           || this.drawings.find(x => x.nummer.toLowerCase().includes(code))
           || this.drawings.find(x => x.bezeichnung.toLowerCase().includes(code));
    if (d) this.setState({ drawingId:d.id, drawingError:'', drawingQuery:'' });
    else this.setState({ drawingError:'Keine Zeichnung zu „'+this.state.drawingQuery+'" gefunden', drawingQuery:'' }, ()=>{ if(this.drawingScanRef.current) this.drawingScanRef.current.focus(); });
  };
  onDrawingKey = (e) => { if (e.key==='Enter') this.doDrawingScan(); };
  clearDrawing = () => this.setState({ drawingId:null, drawingError:'' }, ()=>{ if(this.drawingScanRef.current) this.drawingScanRef.current.focus(); });

  // edit / create
  existingCats() { return Array.from(new Set(this.state.parts.map(x => x.kategorie).filter(Boolean))); }
  startEdit = () => { const p = this.state.parts.find(x=>x.id===this.state.selectedPartId); this.setState({ editing:true, editDraft:{...p}, editCatNew: !this.existingCats().includes(p.kategorie) }); };
  startCreate = () => this.setState({ view:'detail', creating:true, editing:true, selectedPartId:null, editCatNew:false, editDraft:{ id:'new', nummer:'', bezeichnung:'', lagerplatz:'', bestand:0, mindestbestand:0, einheit:'Stk', kategorie: this.existingCats()[0] || 'Verbindungselemente' } });

  // --- Massen-Import: aus Excel eingefügte (Tab-getrennte) oder CSV-Zeilen. ---
  openImport = () => this.setState({ importOpen:true, importText:'' });
  closeImport = () => this.setState({ importOpen:false });
  onImportText = (e) => this.setState({ importText:e.target.value });
  // Erkennt die Spalte anhand des Kopfzeilen-Namens (tolerant, deutsche Varianten).
  importColOf(h) {
    const n = String(h||'').toLowerCase().replace(/[\s.\-_]/g,'');
    if (/mindest|meldebestand|sollbestand|minbestand|^soll$|^min$/.test(n)) return 'mindestbestand';
    if (/nummer|artnr|artikelnr|teilenr|^nr$/.test(n)) return 'nummer';
    if (/bezeichnung|benennung|beschreibung|^name$|artikel$/.test(n)) return 'bezeichnung';
    if (/lagerplatz|stellplatz|lagerort|^platz$|^ort$|^lager$/.test(n)) return 'lagerplatz';
    if (/bestand|menge|anzahl|^ist$|stück|stueck|^stk$/.test(n)) return 'bestand';
    if (/einheit|^einh$|^me$|mengeneinheit/.test(n)) return 'einheit';
    if (/kategorie|gruppe|warengruppe|^typ$/.test(n)) return 'kategorie';
    return null;
  }
  // Parst den eingefügten Text zu Teil-Datensätzen (+ Statistik).
  parseImport(text) {
    const out = { rows:[], dupes:0, skipped:0, cols:[] };
    const raw = String(text||'').replace(/\r/g,'').split('\n').filter(l => l.trim().length);
    if (!raw.length) return out;
    const delim = raw[0].indexOf('\t')>=0 ? '\t' : (raw[0].indexOf(';')>=0 ? ';' : ',');
    const cells = (line) => line.split(delim).map(c => c.trim());
    const header = cells(raw[0]);
    const headMap = header.map(h => this.importColOf(h));
    const hasHeader = headMap.some(m => m==='nummer' || m==='bezeichnung');
    let dataLines, colMap;
    if (hasHeader) { dataLines = raw.slice(1); colMap = headMap; out.cols = header.filter((_,i)=>headMap[i]); }
    else { dataLines = raw; colMap = ['nummer','bezeichnung','lagerplatz','bestand','mindestbestand','einheit','kategorie']; out.cols = colMap; }
    const toInt = (v) => { const n = parseInt(String(v==null?'':v).replace(/[^\d-]/g,''),10); return isNaN(n)?0:Math.max(0,n); };
    const existNums = {}; this.state.parts.forEach(p => { existNums[String(p.nummer).trim().toLowerCase()]=1; });
    const batchNums = {};
    dataLines.forEach(line => {
      const c = cells(line);
      const rec = { nummer:'', bezeichnung:'', lagerplatz:'', bestand:0, mindestbestand:0, einheit:'', kategorie:'' };
      c.forEach((val, i) => { const k = colMap[i]; if (!k) return; rec[k] = (k==='bestand'||k==='mindestbestand') ? toInt(val) : val; });
      const num = String(rec.nummer||'').trim();
      if (!num) { out.skipped++; return; }
      const key = num.toLowerCase();
      if (existNums[key] || batchNums[key]) { out.dupes++; return; }
      batchNums[key] = 1;
      out.rows.push({ nummer:num, bezeichnung:String(rec.bezeichnung||'').trim()||num, lagerplatz:String(rec.lagerplatz||'').trim(),
        bestand:rec.bestand||0, mindestbestand:rec.mindestbestand||0, einheit:String(rec.einheit||'').trim()||'Stk', kategorie:String(rec.kategorie||'').trim()||'Sonstige' });
    });
    return out;
  }
  doImport = () => {
    const res = this.parseImport(this.state.importText);
    if (!res.rows.length) { this.flash((res.dupes||res.skipped) ? ('Keine neuen Teile · '+res.dupes+' Duplikate · '+res.skipped+' ohne Nummer') : 'Keine Teile erkannt — bitte mit Kopfzeile einfügen'); return; }
    const now = new Date().toISOString();
    const created = res.rows.map((r, i) => ({ ...r, id:'p'+Date.now()+'_'+i, geaendertAm:now }));
    this.setState({ parts:[...this.state.parts, ...created], importOpen:false, importText:'' });
    // In die Cloud schieben (gesammelt in die Warteschlange, dann sequenziell abgleichen).
    created.forEach(p => this._pending.push({ kind:'part', body:this.partBody(p, false) }));
    this.savePending();
    this.syncNow();
    this.flash(created.length+' Teile importiert'+(res.dupes?' · '+res.dupes+' Duplikate übersprungen':'')+(res.skipped?' · '+res.skipped+' ohne Nummer':''));
  };
  editField = (k) => (e) => { let v = e.target.value; if(k==='bestand'||k==='mindestbestand') v = v===''?0:Math.max(0,parseInt(v,10)||0); this.setState({ editDraft:{...this.state.editDraft, [k]:v} }); };
  editCatSelect = (e) => { const v = e.target.value;
    if (v==='__new__') this.setState({ editCatNew:true, editDraft:{...this.state.editDraft, kategorie:''} });
    else this.setState({ editCatNew:false, editDraft:{...this.state.editDraft, kategorie:v} });
  };
  cancelEdit = () => { if(this.state.creating) this.setState({ view:'teile', editing:false, creating:false, editDraft:null }); else this.setState({ editing:false, editDraft:null }); };
  saveEdit = () => {
    const d = this.state.editDraft;
    if (!d.nummer.trim() || !d.bezeichnung.trim()) { this.flash('Teilenummer und Bezeichnung sind Pflicht'); return; }
    // Teilenummer muss eindeutig sein — doppelte Nummern brechen sonst
    // Buchung und Stücklisten-Auflösung (beide nehmen den ersten Treffer).
    const num = d.nummer.trim().toLowerCase();
    const dupe = this.state.parts.some(p => p.id!==d.id && p.nummer.trim().toLowerCase()===num);
    if (dupe) { this.flash('Teilenummer „'+d.nummer.trim()+'" existiert bereits'); return; }
    const clean = { ...d, nummer:d.nummer.trim(), bezeichnung:d.bezeichnung.trim(), kategorie:(d.kategorie||'').trim()||'Sonstige', geaendertAm:new Date().toISOString() };
    if (this.state.creating) {
      const id = 'p'+Date.now();
      const created = { ...clean, id };
      this.setState({ parts:[created, ...this.state.parts], view:'detail', selectedPartId:id, editing:false, creating:false, editDraft:null });
      this.pushPart(created);
      this.flash('Teil angelegt: '+clean.bezeichnung);
    } else {
      this.setState({ parts:this.state.parts.map(p=>p.id===d.id?{...clean}:p), editing:false, editDraft:null });
      this.pushPart(clean);
      this.flash('Änderungen gespeichert');
    }
  };
  deletePart = (id) => {
    const p = this.state.parts.find(x=>x.id===id); if (!p) return;
    if (typeof window!=='undefined' && window.confirm && !window.confirm('Teil „'+p.bezeichnung+'" wirklich löschen? Bestand und Verknüpfungen gehen verloren.')) return;
    this.setState({ parts:this.state.parts.filter(x=>x.id!==id), view:'teile', selectedPartId:null, editing:false, creating:false, editDraft:null });
    // Cloud-Sync: als gelöscht markieren, damit andere Geräte es ebenfalls entfernen.
    this.pushPart(p, { deleted:true });
    this.flash('Teil gelöscht: '+p.bezeichnung);
  };

  // --- Login / Registrierung ---
  pickLoginUser = (id) => this.setState({ loginUser:id, authError:'' });
  // --- Passwörter: SHA-256-Hash (nur im sicheren Kontext/HTTPS). Ohne sicheren
  // Kontext Fallback auf Klartext, damit das Login nie bricht. Alte Klartext-
  // Passwörter (Demo-Konten) werden beim ersten erfolgreichen Login migriert. ---
  hashPw = async (pw) => {
    try {
      if (typeof window!=='undefined' && window.crypto && window.crypto.subtle) {
        const buf = await window.crypto.subtle.digest('SHA-256', new TextEncoder().encode(String(pw)));
        return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      }
    } catch(e) {}
    return null;
  };
  isHash(s) { return typeof s==='string' && /^[a-f0-9]{64}$/.test(s); }
  pwMatches = async (entered, stored) => {
    if (this.isHash(stored)) { const h = await this.hashPw(entered); return h!==null && h===stored; }
    return String(entered) === String(stored||'');
  };
  pwStore = async (pw) => { const h = await this.hashPw(pw); return h!==null ? h : String(pw); };

  doLogin = async () => {
    const u = this.state.users.find(x => x.id === this.state.loginUser);
    if (!u) { this.setState({ authError:'Bitte zuerst einen Mitarbeiter wählen' }); return; }
    const ok = await this.pwMatches(this.state.pin||'', u.password||'');
    if (!ok) { this.setState({ authError:'Falsches Passwort für '+u.name }); return; }
    let loginUser = u;
    // Legacy-Klartext beim ersten Login auf Hash heben (best effort) + hochladen.
    if (!this.isHash(u.password||'')) {
      const h = await this.hashPw(this.state.pin||'');
      if (h) {
        const users = this.state.users.map(x => x.id===u.id ? { ...x, password:h, geaendertAm:new Date().toISOString() } : x);
        loginUser = users.find(x => x.id===u.id);
        this.saveUsers(users);
        this.setState({ users });
      }
    }
    this.setState({ screen:'app', user:loginUser, view:'dashboard', pin:'', authError:'' });
    // Angemeldetes Konto in die Cloud spiegeln (idempotent; no-op wenn Sync aus).
    this.pushUser(loginUser);
  };
  setLoginMode = (m) => this.setState({ loginMode:m, authError:'', regError:'', reg:{ name:'', role:'Montage', email:'', pass:'', pass2:'' } });
  regField = (k) => (e) => this.setState({ reg:{ ...this.state.reg, [k]:e.target.value } });
  submitRegister = async () => {
    const r = this.state.reg;
    if (!r.name.trim()) { this.setState({ regError:'Bitte Namen eingeben' }); return; }
    const email = (r.email||'').trim().toLowerCase();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { this.setState({ regError:'Bitte eine gültige E-Mail-Adresse eingeben' }); return; }
    if (this.state.users.some(u => (u.email||'').toLowerCase() === email)) { this.setState({ regError:'Diese E-Mail-Adresse ist bereits registriert' }); return; }
    if ((r.pass||'').length < 4) { this.setState({ regError:'Passwort muss mindestens 4 Zeichen haben' }); return; }
    if (r.pass !== r.pass2) { this.setState({ regError:'Passwörter stimmen nicht überein' }); return; }
    if (this.state.users.some(u => u.name.trim().toLowerCase() === r.name.trim().toLowerCase())) { this.setState({ regError:'Dieser Name existiert bereits' }); return; }
    const u = { id:'u'+Date.now(), name:r.name.trim(), role:r.role||'Sonstige', email, initials:this.initialsOf(r.name), hue:Math.floor(Math.random()*360), password: await this.pwStore(r.pass), admin:false, geaendertAm:new Date().toISOString() };
    const users = [...this.state.users, u]; this.saveUsers(users);
    this.setState({ users, loginMode:'login', loginUser:u.id, pin:'', regError:'', authError:'' });
    this.pushUser(u); // Konto in die Cloud spiegeln (no-op wenn Sync aus).
    this.flash('Konto erstellt — jetzt mit deinem Passwort anmelden');
  };

  // --- Passwort ändern (eigenes Konto) ---
  openPwModal = () => this.setState({ pwModal:true, pwCur:'', pwNew:'', pwNew2:'', pwError:'' });
  closePwModal = () => this.setState({ pwModal:false, pwError:'' });
  submitPwChange = async () => {
    const { pwCur, pwNew, pwNew2, user } = this.state;
    if (!user) return;
    const ok = await this.pwMatches(pwCur, user.password);
    if (!ok) { this.setState({ pwError:'Aktuelles Passwort ist falsch' }); return; }
    if ((pwNew||'').length < 4) { this.setState({ pwError:'Neues Passwort muss mindestens 4 Zeichen haben' }); return; }
    if (pwNew !== pwNew2) { this.setState({ pwError:'Neue Passwörter stimmen nicht überein' }); return; }
    const upd = { ...user, password: await this.pwStore(pwNew), geaendertAm:new Date().toISOString() };
    const users = this.state.users.map(u => u.id===user.id ? upd : u);
    this.saveUsers(users);
    this.setState({ users, user:upd, pwModal:false, pwError:'' });
    this.pushUser(upd);
    this.flash('Passwort geändert');
  };

  // --- Benutzerverwaltung (Personal) ---
  startUserCreate = () => this.setState({ userEditing:true, userError:'', userDraft:{ id:null, name:'', role:'Montage', email:'', password:'', admin:false } });
  startUserEdit = (id) => { const u = this.state.users.find(x=>x.id===id); if(u) this.setState({ userEditing:true, userError:'', userDraft:{ id:u.id, name:u.name, role:u.role, email:u.email||'', password:'', admin:!!u.admin } }); };
  cancelUser = () => this.setState({ userEditing:false, userDraft:null, userError:'' });
  userField = (k) => (e) => { const v = k==='admin' ? e.target.checked : e.target.value; this.setState({ userDraft:{ ...this.state.userDraft, [k]:v } }); };
  saveUser = async () => {
    const d = this.state.userDraft; if (!d) return;
    if (!d.name.trim()) { this.setState({ userError:'Bitte Namen eingeben' }); return; }
    const email = (d.email||'').trim().toLowerCase();
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { this.setState({ userError:'E-Mail-Adresse ist ungültig' }); return; }
    if (email && this.state.users.some(u => u.id!==d.id && (u.email||'').toLowerCase()===email)) { this.setState({ userError:'Diese E-Mail-Adresse ist bereits vergeben' }); return; }
    const dupe = this.state.users.some(u => u.id!==d.id && u.name.trim().toLowerCase()===d.name.trim().toLowerCase());
    if (dupe) { this.setState({ userError:'Dieser Name existiert bereits' }); return; }
    if (!d.id && (d.password||'').length < 4) { this.setState({ userError:'Passwort muss mindestens 4 Zeichen haben' }); return; }
    const nowIso = new Date().toISOString();
    let users, updatedSelf = null, changedUser = null;
    if (d.id) {
      const newPass = (d.password||'').length >= 4 ? await this.pwStore(d.password) : null;
      users = this.state.users.map(u => {
        if (u.id !== d.id) return u;
        const merged = { ...u, name:d.name.trim(), role:d.role, email, admin:!!d.admin, initials:this.initialsOf(d.name), geaendertAm:nowIso };
        if (newPass) merged.password = newPass;
        if (this.state.user && this.state.user.id===u.id) updatedSelf = merged;
        changedUser = merged;
        return merged;
      });
    } else {
      const u = { id:'u'+Date.now(), name:d.name.trim(), role:d.role||'Sonstige', email, initials:this.initialsOf(d.name), hue:Math.floor(Math.random()*360), password: await this.pwStore(d.password), admin:!!d.admin, geaendertAm:nowIso };
      users = [...this.state.users, u];
      changedUser = u;
    }
    // Es muss immer mindestens ein Admin übrig bleiben (auch nach „Bearbeiten").
    if (!users.some(u => u.admin)) { this.setState({ userError:'Mindestens ein Administrator muss bestehen bleiben' }); return; }
    this.saveUsers(users);
    // Hat sich der angemeldete Admin selbst die Rechte genommen, darf er die
    // Personal-Seite nicht mehr sehen → zurück aufs Dashboard.
    const lostOwnAdmin = updatedSelf && !updatedSelf.admin && this.state.view==='personal';
    this.setState({ users, userEditing:false, userDraft:null, userError:'',
      ...(updatedSelf?{user:updatedSelf}:{}), ...(lostOwnAdmin?{view:'dashboard'}:{}) });
    if (changedUser) this.pushUser(changedUser); // Konto in die Cloud spiegeln.
    this.flash(d.id ? 'Mitarbeiter aktualisiert: '+d.name.trim() : 'Mitarbeiter angelegt: '+d.name.trim());
  };
  deleteUser = (id) => {
    if (this.state.user && this.state.user.id === id) { this.flash('Das eigene Konto kann nicht gelöscht werden'); return; }
    const target = this.state.users.find(u => u.id === id);
    const remaining = this.state.users.filter(u => u.id !== id);
    if (!remaining.some(u => u.admin)) { this.flash('Mindestens ein Admin muss bestehen bleiben'); return; }
    this.saveUsers(remaining);
    this.setState({ users:remaining });
    if (target) this.pushUser({ ...target, geaendertAm:new Date().toISOString() }, { deleted:true });
    this.flash('Mitarbeiter gelöscht');
  };

  componentDidMount() {
    // Auto-Sync (Intervall + Fokus) vorbereiten; die Callbacks prüfen selbst,
    // ob eingeloggt und Sync aktiv ist. Konten sofort holen, damit registrierte
    // Mitarbeiter schon auf dem Login-Bildschirm auswählbar sind.
    if (this.cloudOn()) { this.startSync(); this.pullUsers(); }

  componentWillUnmount() { this.stopSync(); }

  componentDidUpdate(_, prev) {
    // Beim Betreten der App (nach Login) erstmals abgleichen; danach übernimmt das Intervall.
    if (prev.screen!=='app' && this.state.screen==='app' && this.cloudOn()) {
      this.startSync();
      if (!this.state.lastSync) this.seedCloud(); else this.syncNow();
    }
    if (this.state.view==='buchen' && prev.view!=='buchen' && !this.state.bookPart && !this.state.bookDone) {
      setTimeout(()=>{ if(this.scanRef.current) this.scanRef.current.focus(); }, 50);
    }
    if (this.state.view==='baubarkeit' && prev.view!=='baubarkeit' && !this.state.drawingId) {
      setTimeout(()=>{ if(this.drawingScanRef.current) this.drawingScanRef.current.focus(); }, 50);
    }
    if (this.state.view==='bestellung' && prev.view!=='bestellung') this.ensureReorderInit();
    // Tracking-Status laden, sobald der „Gesendet"-Tab sichtbar wird.
    const inGesendet = this.state.view==='bestellung' && this.state.orderTab==='gesendet';
    const wasGesendet = prev.view==='bestellung' && prev.orderTab==='gesendet';
    if (inGesendet && !wasGesendet) this.fetchTrack();
    // Persistenz: Bestände, Buchungen und ausgelöste Bestellungen spiegeln.
    if (prev.parts !== this.state.parts) this.saveJSON('lp_parts', this.state.parts);
    if (prev.transactions !== this.state.transactions) this.saveJSON('lp_tx', this.state.transactions);
    if (prev.sentOrders !== this.state.sentOrders) this.saveJSON('lp_orders', this.state.sentOrders);
  }

                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden")}>
                      <div style={css("display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #f0f1f3")}>
                        <div style={css("font-size:15px;font-weight:600;color:#111827")}>Letzte Buchungen</div>
                        <button onClick={V.goHistorie} style={css(`border:none;background:transparent;color:${accent};font-size:13px;font-weight:600`)}>Verlauf →</button>
                      </div>
                      <div>
                        {V.dashRecent.map(t => (
                          <div key={t.id} style={css("display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid #f4f5f7")}>
                            <div style={css(`width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;background:${t.tBg};color:${t.tColor}`)}>{t.sign}</div>
                            <div style={css("flex:1;min-width:0")}>
                              <div style={css("font-size:13.5px;font-weight:500;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{t.bezeichnung}</div>
                              <div style={css("font-size:11.5px;color:#9ca3af")}>{t.user} · {t.when}</div>

                            <div style={css(`font-size:14px;font-weight:600;color:${t.tColor};flex:none`)}>{t.deltaLabel}</div>
                          </div>

                      </div>
                    </div>
                  </div>
                </div>
                )}

                {/* BUCHEN */}
                {V.isBuchen && (
                <div style={css("max-width:760px;margin:0 auto;animation:lpfade .3s ease")}>

                  {V.hasBookDone && (
                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;padding:40px;text-align:center;box-shadow:0 1px 2px rgba(15,23,42,.04)")}>
                      <div style={css("width:64px;height:64px;border-radius:50%;background:#f0fdf4;color:#15803d;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 18px")}>✓</div>
                      <div style={css("font-size:20px;font-weight:700;color:#111827")}>{V.bookDone.type} gebucht</div>
                      <div style={css("font-size:15px;color:#6b7280;margin-top:6px")}>{V.bookDone.menge}× {V.bookDone.bezeichnung}</div>
                      <div style={css("display:inline-flex;align-items:center;gap:10px;margin-top:18px;padding:12px 20px;background:#f9fafb;border:1px solid #e5e7eb;border-radius:11px")}>
                        <span style={css("font-size:13px;color:#6b7280")}>Neuer Bestand</span>
                        <span style={css("font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:#111827")}>{V.bookDone.rest}</span>
                        <span style={css("font-size:13px;color:#9ca3af")}>{V.bookDone.einheit}</span>
                      </div>
                      <div style={css("display:flex;gap:12px;justify-content:center;margin-top:26px")}>

                      </div>
                    </div>
                  )}

                  {V.hasBookPart && (
                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04)")}>

                          <div style={css("font-family:'IBM Plex Mono',monospace;font-size:13px;color:#6b7280;margin-top:4px")}>{V.bookPart.nummer} · Lagerplatz {V.bookPart.lagerplatz}</div>
                        </div>
                        <div style={css("text-align:right;flex:none")}>
                          <div style={css("font-size:12px;color:#9ca3af")}>Aktueller Bestand</div>
                          <div style={css("font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;color:#111827")}>{V.bookPart.bestand} <span style={css("font-size:14px;color:#9ca3af")}>{V.bookPart.einheit}</span></div>
                        </div>
                      </div>
                      <div style={css("padding:24px 26px")}>
                        <div className="lp-1col-m" style={css("display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px")}>
                          <button onClick={V.setEntnahme} style={css(`padding:16px;border:2px solid ${V.entnahmeBorder};border-radius:13px;background:${V.entnahmeBg};text-align:left`)}>
                            <div style={css(`font-size:16px;font-weight:700;color:${V.entnahmeFg}`)}>− Entnahme</div>
                            <div style={css("font-size:12.5px;color:#6b7280;margin-top:2px")}>Teil aus dem Lager nehmen</div>
                          </button>
                          <button onClick={V.setEinlagerung} style={css(`padding:16px;border:2px solid ${V.einBorder};border-radius:13px;background:${V.einBg};text-align:left`)}>
                            <div style={css(`font-size:16px;font-weight:700;color:${V.einFg}`)}>+ Einlagerung</div>
                            <div style={css("font-size:12.5px;color:#6b7280;margin-top:2px")}>Teil ins Lager legen</div>
                          </button>
                        </div>
                        <div className="lp-wrap-m" style={css("display:flex;align-items:center;justify-content:space-between;gap:20px")}>
                          <div style={css("font-size:15px;font-weight:600;color:#374151")}>Menge</div>
                          <div style={css("display:flex;align-items:center;gap:12px")}>
                            <button onClick={V.qtyMinus} style={css("width:52px;height:52px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;font-size:26px;font-weight:600;color:#374151")}>−</button>
                            <Hx tag="input" value={V.bookQty} onChange={V.onQty} onFocus={V.onQtyFocus} onBlur={V.onQtyBlur} innerRef={V.qtyRef} type="number" inputMode="numeric" css="width:96px;height:52px;text-align:center;border:1.5px solid #e5e7eb;border-radius:12px;font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:600;outline:none" focus={`border-color:${accent}`} />
                            <button onClick={V.qtyPlus} style={css("width:52px;height:52px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;font-size:26px;font-weight:600;color:#374151")}>+</button>
                          </div>
                        </div>
                        <div style={css("display:flex;align-items:center;justify-content:space-between;margin-top:22px;padding:14px 18px;background:#f9fafb;border-radius:12px")}>
                          <span style={css("font-size:14px;color:#6b7280")}>Bestand nach Buchung</span>
                          <span style={css(`font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:600;color:${V.bookTypeColor}`)}>{V.projBestand} {V.bookPart.einheit}</span>
                        </div>
                        {V.bookOver && (
                          <div style={css("margin-top:12px;padding:11px 16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;color:#b45309;font-size:13px")}>Nur {V.bookMax} {V.bookPart.einheit} auf Lager — es können höchstens {V.bookMax} entnommen werden.</div>
                        )}
                        <div style={css("display:flex;gap:12px;margin-top:22px")}>
                          <button onClick={V.cancelBook} style={css("padding:14px 22px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;font-size:15px;font-weight:600;color:#374151")}>Abbrechen</button>
                          <button onClick={V.confirmBooking} style={css(`flex:1;padding:14px;border:none;border-radius:12px;background:${accent};color:#fff;font-size:16px;font-weight:700;box-shadow:0 8px 20px -10px ${accent}`)}>Buchung bestätigen</button>

                      </div>
                    </div>

                  {V.scanPrompt && (

                          {V.quickScans.map(qs => (
                            <Hx key={qs.code} tag="button" onClick={qs.pick} css="padding:9px 14px;border:1.5px solid #e5e7eb;border-radius:9px;background:#f9fafb;font-family:'IBM Plex Mono',monospace;font-size:13px;color:#374151" hover={`border-color:${accent};color:${accent}`}>{qs.code}</Hx>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}

                </div>

                      <span style={css("position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;color:#9ca3af")}>⌕</span>
                      <Hx tag="input" value={V.search} onChange={V.onSearch} autoFocus placeholder="Suche nach Teilenummer, Bezeichnung oder Lagerplatz…" css="width:100%;padding:13px 16px 13px 40px;border:1.5px solid #e5e7eb;border-radius:12px;font-size:15px;background:#fff;outline:none" focus={`border-color:${accent}`} />
                    </div>
                    <button onClick={V.openImport} style={css("display:flex;align-items:center;gap:7px;padding:13px 18px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fff;color:#374151;font-size:14.5px;font-weight:600;white-space:nowrap")}>⇪ Importieren</button>
                    <button onClick={V.startCreate} style={css(`display:flex;align-items:center;gap:8px;padding:13px 20px;border:none;border-radius:12px;background:${accent};color:#fff;font-size:14.5px;font-weight:600;white-space:nowrap;box-shadow:0 6px 16px -9px ${accent}`)}><span style={css("font-size:17px")}>+</span> Neues Teil</button>
                  </div>

                  <div style={css("display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:16px")}>
                    {V.cats.map(c => (
                      <button key={c.name} onClick={c.pick} style={css(`padding:7px 14px;border:1.5px solid ${c.border};border-radius:9px;background:${c.bg};color:${c.fg};font-size:13px;font-weight:500`)}>{c.name}</button>
                    ))}
                    <div style={css("flex:1")}></div>
                    <span style={css("font-size:13px;color:#9ca3af")}>Sortieren:</span>
                    <button onClick={V.sortByName} style={css(`padding:7px 12px;border:1.5px solid ${V.sortNameBorder};border-radius:9px;background:${V.sortNameBg};color:${V.sortNameFg};font-size:13px;font-weight:500`)}>Bezeichnung</button>
                    <button onClick={V.sortByStock} style={css(`padding:7px 12px;border:1.5px solid ${V.sortStockBorder};border-radius:9px;background:${V.sortStockBg};color:${V.sortStockFg};font-size:13px;font-weight:500`)}>Bestand</button>
                  </div>

                  <div className="lp-table" style={css("background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden")}>
                    <div style={css("display:grid;grid-template-columns:1.6fr 1fr 0.9fr 0.9fr 1fr;gap:12px;padding:12px 20px;background:#f9fafb;border-bottom:1px solid #f0f1f3;font-size:11.5px;font-weight:600;letter-spacing:.04em;color:#9ca3af;text-transform:uppercase")}>
                      <div>Bezeichnung</div><div>Teilenummer</div><div>Lagerplatz</div><div style={css("text-align:right")}>Bestand</div><div style={css("text-align:right")}>Status</div>
                    </div>
                    {V.listed.map(p => (
                      <Hx key={p.id} tag="button" onClick={p.open} css="width:100%;display:grid;grid-template-columns:1.6fr 1fr 0.9fr 0.9fr 1fr;gap:12px;align-items:center;padding:13px 20px;border:none;border-bottom:1px solid #f4f5f7;background:#fff;text-align:left" hover="background:#fafafa">
                        <div style={css("min-width:0")}>
                          <div style={css("font-size:14px;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{p.bezeichnung}</div>
                          <div style={css("font-size:11.5px;color:#9ca3af;margin-top:1px")}>{p.kategorie}</div>
                        </div>
                        <div style={css("font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis")}>{p.nummer}</div>
                        <div style={css("font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#6b7280")}>{p.lagerplatz}</div>
                        <div style={css("text-align:right;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:#1f2937")}>{p.bestand} <span style={css("font-size:11px;color:#cbd5e1;font-weight:400")}>/{p.mindestbestand}</span></div>
                        <div style={css("text-align:right")}><span style={css(`font-size:11.5px;font-weight:600;padding:4px 9px;border-radius:7px;background:${p.statusBg};color:${p.statusColor};white-space:nowrap`)}>{p.statusLabel}</span></div>
                      </Hx>
                    ))}
                    {V.noResults && (
                      <div style={css("padding:40px;text-align:center;color:#9ca3af;font-size:14px")}>Keine Teile gefunden.</div>
                    )}
                  </div>
                  <div style={css("margin-top:12px;font-size:12.5px;color:#9ca3af")}>{V.listedCount} von {V.totalCount} Teilen</div>
                </div>
                )}

                {/* DETAIL / BEARBEITEN */}
                {V.isDetail && (
                <div style={css("max-width:880px;animation:lpfade .3s ease")}>
                  <Hx tag="button" onClick={V.backToList} css="display:flex;align-items:center;gap:7px;border:none;background:transparent;color:#6b7280;font-size:14px;font-weight:500;padding:4px 0;margin-bottom:14px" hover="color:#1f2937">← Zurück zur Liste</Hx>

                  {V.editing && (
                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04)")}>
                      <div style={css("padding:20px 26px;border-bottom:1px solid #f0f1f3;font-size:17px;font-weight:700;color:#111827")}>{V.editTitle}</div>
                      <div className="lp-form-grid" style={css("padding:26px;display:grid;grid-template-columns:1fr 1fr;gap:18px")}>
                        <div style={css("grid-column:1 / -1")}>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Bezeichnung *</div>
                          <Hx tag="input" value={V.editDraft.bezeichnung||''} onChange={V.efBezeichnung} placeholder="z. B. Rillenkugellager 6205-2RS" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Teilenummer *</div>
                          <Hx tag="input" value={V.editDraft.nummer||''} onChange={V.efNummer} placeholder="z. B. LAG-6205-2RS" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Lagerplatz</div>
                          <Hx tag="input" value={V.editDraft.lagerplatz||''} onChange={V.efLagerplatz} placeholder="z. B. A-01-02" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Bestand</div>
                          <Hx tag="input" value={V.editDraft.bestand} onChange={V.efBestand} type="number" inputMode="numeric" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Mindestbestand</div>
                          <Hx tag="input" value={V.editDraft.mindestbestand} onChange={V.efMindest} type="number" inputMode="numeric" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-family:'IBM Plex Mono',monospace;font-size:14px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Kategorie</div>
                          <Hx tag="select" value={V.editCatSelectValue} onChange={V.efKategorieSelect} css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;background:#fff;outline:none" focus={`border-color:${accent}`}>
                            {V.editCats.map(c => <option key={c} value={c}>{c}</option>)}
                            <option value="__new__">➕ Neue Kategorie…</option>
                          </Hx>
                          {V.editCatNew && (
                            <Hx tag="input" value={V.editDraft.kategorie||''} onChange={V.efKategorie} placeholder="Neue Kategorie eingeben" css="width:100%;margin-top:8px;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                          )}
                        </div>
                        <div>
                          <div style={css("font-size:12.5px;font-weight:600;color:#6b7280;margin-bottom:6px")}>Einheit</div>
                          <Hx tag="input" value={V.editDraft.einheit||''} onChange={V.efEinheit} placeholder="Stk" css="width:100%;padding:11px 13px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14.5px;outline:none" focus={`border-color:${accent}`} />
                        </div>
                      </div>
                      <div style={css("display:flex;gap:12px;justify-content:flex-end;padding:18px 26px;border-top:1px solid #f0f1f3;background:#fafafa")}>
                        <button onClick={V.cancelEdit} style={css("padding:11px 20px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14.5px;font-weight:600;color:#374151")}>Abbrechen</button>
                        <button onClick={V.saveEdit} style={css(`padding:11px 24px;border:none;border-radius:10px;background:${accent};color:#fff;font-size:14.5px;font-weight:600`)}>Speichern</button>
                      </div>
                    </div>
                  )}

                  {V.showDetailCard && (<React.Fragment>
                    <div style={css("background:#fff;border:1px solid #e5e7eb;border-radius:16px;overflow:hidden;box-shadow:0 1px 2px rgba(15,23,42,.04)")}>
                      <div style={css("padding:24px 28px;border-bottom:1px solid #f0f1f3;display:flex;align-items:flex-start;gap:16px")}>
                        <div style={css("flex:1;min-width:0")}>
                          <span style={css(`font-size:11.5px;font-weight:600;padding:4px 10px;border-radius:7px;background:${V.selPart.statusBg};color:${V.selPart.statusColor}`)}>{V.selPart.statusLabel}</span>
                          <div style={css("font-size:22px;font-weight:700;color:#111827;margin-top:10px")}>{V.selPart.bezeichnung}</div>
                          <div style={css("font-family:'IBM Plex Mono',monospace;font-size:13.5px;color:#6b7280;margin-top:4px")}>{V.selPart.nummer}</div>
                        </div>
                        <div style={css("display:flex;gap:8px;flex:none")}>
                          <Hx tag="button" onClick={V.startEdit} css="display:flex;align-items:center;gap:7px;padding:10px 18px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;font-size:14px;font-weight:600;color:#374151" hover={`border-color:${accent};color:${accent}`}>Bearbeiten</Hx>
                          <Hx tag="button" onClick={V.deleteSelPart} title="Teil löschen" css="display:flex;align-items:center;gap:7px;padding:10px 16px;border:1.5px solid #fecaca;border-radius:10px;background:#fff;font-size:14px;font-weight:600;color:#dc2626" hover="background:#fef2f2">Löschen</Hx>
                        </div>

                        {V.hasBinError && (
